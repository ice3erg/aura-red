<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — +aura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
</head>
<body>
  <main class="center-shell">
    <section class="card auth-card stack-lg">
      <div class="logo"><span class="logo-dot"></span> +aura</div>
      <div class="stack">
        <div class="eyebrow">Welcome back</div>
        <h2>Return to your radar.</h2>
        <p class="lead">Demo account: <strong>max@aura.app</strong> / <strong>123456</strong></p>
      </div>
      <div class="notice error hidden" data-form-notice></div>
      <form class="stack" data-login-form>
        <div class="input-group">
          <label class="label" for="email">Email</label>
          <input class="input" id="email" name="email" type="email" placeholder="you@example.com" required>
        </div>
        <div class="input-group">
          <label class="label" for="password">Password</label>
          <input class="input" id="password" name="password" type="password" placeholder="Your password" required>
        </div>
        <button class="btn btn-primary btn-full" type="submit">Log in</button>
      </form>
      <div class="auth-links">
        <span>No account yet?</span>
        <a href="/signup">Create one</a>
      </div>
    </section>
  </main>
</body>
</html>
