<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>+aura</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #ff2b2b; --bg: #060608; --border: rgba(255,255,255,0.08); --muted: rgba(255,255,255,0.45); --surface: rgba(255,255,255,0.05); }
    html, body { height: 100%; background: var(--bg); color: #fff; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
    .bg { position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(255,43,43,0.12) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 50% 110%,rgba(255,43,43,0.07) 0%,transparent 60%); }
    .bg-grid { position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:40px 40px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%); }
    .shell { position:relative;z-index:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 24px calc(24px + env(safe-area-inset-bottom)); }
    .logo-wrap { text-align:center;margin-bottom:40px;animation:fadeInDown 0.6s ease both; }
    .logo { font-size:48px;font-weight:900;letter-spacing:-2px;color:#fff;text-shadow:0 0 20px rgba(255,255,255,0.9),0 0 60px rgba(255,255,255,0.4),0 0 120px rgba(255,43,43,0.3); }
    .logo-sub { font-size:13px;font-weight:500;color:var(--muted);letter-spacing:0.08em;margin-top:6px; }
    .card { width:100%;max-width:380px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:28px;padding:28px 24px 24px;backdrop-filter:blur(20px);animation:fadeInUp 0.5s 0.1s ease both; }
    .card-title { font-size:22px;font-weight:800;letter-spacing:-0.3px;margin-bottom:20px; }
    .field-wrap { position:relative;margin-bottom:10px; }
    .field-label { position:absolute;top:11px;left:15px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);pointer-events:none;transition:color 0.2s; }
    .field-input { width:100%;padding:26px 15px 10px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:#fff;font:700 15px/1.3 'Inter',system-ui,sans-serif;outline:none;transition:border-color 0.2s,background 0.2s;-webkit-appearance:none; }
    .field-input:focus { border-color:rgba(255,43,43,0.4);background:rgba(255,43,43,0.05); }
    .field-input:focus + .field-label { color:var(--red); }
    .field-input.filled + .field-label { color:rgba(255,255,255,0.3); }
    .btn-primary { width:100%;padding:16px;border-radius:16px;border:none;background:#fff;color:#111;font:800 15px/1 'Inter',system-ui,sans-serif;cursor:pointer;transition:opacity 0.15s,transform 0.1s;margin-top:6px;letter-spacing:-0.1px; }
    .btn-primary:hover { opacity:0.92; } .btn-primary:active { transform:scale(0.98); } .btn-primary:disabled { opacity:0.4;cursor:default;transform:none; }
    .notice { padding:11px 14px;border-radius:12px;margin-bottom:10px;font-size:13px;font-weight:600;display:none;background:rgba(255,43,43,0.1);border:1px solid rgba(255,43,43,0.25);color:#ff8080; }
    .notice.visible { display:block; }
    .notice.success { background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.25);color:#4ade80; }
    .otp-wrap { display:flex;gap:8px;margin-bottom:10px; }
    .otp-inp { flex:1;padding:14px 0;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:#fff;font:800 22px/1 'Inter',system-ui,sans-serif;text-align:center;outline:none;-webkit-appearance:none;transition:border-color 0.2s; }
    .otp-inp:focus { border-color:rgba(255,43,43,0.4);background:rgba(255,43,43,0.05); }
    .back-btn { background:none;border:none;color:var(--muted);font:600 13px/1 'Inter',system-ui,sans-serif;cursor:pointer;padding:0;margin-bottom:16px;display:flex;align-items:center;gap:6px; }
    .back-btn:hover { color:#fff; }
    .card-footer { text-align:center;margin-top:16px;font-size:13px;color:var(--muted); }
    .card-footer a { color:#fff;font-weight:700;text-decoration:none; }
    .link-btn { background:none;border:none;color:rgba(255,255,255,0.4);font:600 12px/1 Inter,sans-serif;cursor:pointer;text-decoration:underline;padding:0; }
    .link-btn:hover { color:#fff; }
    @keyframes fadeInDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  </style>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#060608">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>
  <div class="bg"></div><div class="bg-grid"></div>
  <div class="shell">
    <div class="logo-wrap">
      <div class="logo">+aura</div>
      <div class="logo-sub">найди людей на своей волне</div>
    </div>
    <div class="card">

      <!-- Шаг 1: email + пароль -->
      <div id="s1">
        <div class="card-title">Войти</div>
        <div class="notice" id="n1"></div>
        <div class="field-wrap">
          <input class="field-input" id="email" type="email" autocomplete="email" autocapitalize="none" inputmode="email" />
          <span class="field-label">Почта</span>
        </div>
        <div class="field-wrap">
          <input class="field-input" id="password" type="password" autocomplete="current-password" />
          <span class="field-label">Пароль</span>
        </div>
        <button class="btn-primary" id="loginBtn">Войти</button>
        <div style="text-align:right;margin-top:6px;margin-bottom:-4px;">
          <a href="/forgot" style="font-size:12px;color:rgba(255,255,255,0.35);text-decoration:none;font-weight:600;">Забыл пароль?</a>
        </div>
        <div class="card-footer">Нет аккаунта? <a href="/signup">Создать</a></div>
      </div>

      <!-- Шаг 2: подтверждение почты (если не подтверждена) -->
      <div id="s2" style="display:none;">
        <button class="back-btn" id="backBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Назад
        </button>
        <div class="card-title">Подтверди почту</div>
        <div style="font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:16px;line-height:1.5;">Отправили код на <strong id="emailShow"></strong></div>
        <div class="notice" id="n2"></div>
        <div class="otp-wrap">
          <input class="otp-inp" id="o0" maxlength="1" inputmode="numeric" />
          <input class="otp-inp" id="o1" maxlength="1" inputmode="numeric" />
          <input class="otp-inp" id="o2" maxlength="1" inputmode="numeric" />
          <input class="otp-inp" id="o3" maxlength="1" inputmode="numeric" />
          <input class="otp-inp" id="o4" maxlength="1" inputmode="numeric" />
          <input class="otp-inp" id="o5" maxlength="1" inputmode="numeric" />
        </div>
        <button class="btn-primary" id="verifyBtn" disabled>Подтвердить</button>
        <div style="text-align:center;margin-top:12px;font-size:12px;color:rgba(255,255,255,0.3);">
          Не пришло? <button class="link-btn" id="resendBtn">Отправить снова</button>
        </div>
      </div>

    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
  (function() {
    const U = window.AuraUtils;
    U.fetchMe().then(u => { if (u) U.go(u.name && u.city ? '/home' : '/signup?step=name'); }).catch(()=>{});

    let _email = '';
    const otps = [0,1,2,3,4,5].map(i => document.getElementById('o'+i));

    // Filled labels
    ['email','password'].forEach(id => {
      const el = document.getElementById(id);
      el?.addEventListener('input', () => el.classList.toggle('filled', !!el.value));
    });

    function showNotice(id, msg, type='error') {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.className = 'notice visible' + (type==='success' ? ' success' : '');
    }
    function hideNotice(id) { const el=document.getElementById(id); if(el) el.className='notice'; }

    // ── Логин ──
    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;
      const btn   = document.getElementById('loginBtn');
      hideNotice('n1');
      if (!email || !pass) { showNotice('n1','Заполни все поля'); return; }
      btn.disabled=true; btn.textContent='Входим...';
      try {
        const r = await fetch('/api/auth/login', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ email, password: pass })
        }).then(r=>r.json());

        if (r.ok) { U.go(r.needsOnboarding ? '/signup?step=name' : '/home'); return; }

        // Почта не подтверждена — отправляем код и показываем шаг 2
        if (r.needsVerify) {
          _email = r.email || email;
          await sendVerifyCode(_email);
          document.getElementById('emailShow').textContent = _email;
          document.getElementById('s1').style.display = 'none';
          document.getElementById('s2').style.display = '';
          setTimeout(() => otps[0]?.focus(), 300);
        } else {
          showNotice('n1', r.error || 'Неверная почта или пароль');
        }
      } catch { showNotice('n1','Ошибка сети'); }
      finally { btn.disabled=false; btn.textContent='Войти'; }
    }

    async function sendVerifyCode(email) {
      try {
        await fetch('/api/auth/send-code', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ email, forVerify: true })
        });
      } catch {}
    }

    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.getElementById('email').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('password').focus(); });
    document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
    document.getElementById('backBtn').addEventListener('click', () => {
      document.getElementById('s2').style.display='none';
      document.getElementById('s1').style.display='';
      otps.forEach(i=>i.value='');
      hideNotice('n2');
    });

    // ── OTP ──
    otps.forEach((inp, i) => {
      if (!inp) return;
      inp.addEventListener('input', e => {
        const val = e.target.value.replace(/[^0-9]/g,'');
        if (val.length > 1) {
          val.slice(0,6).split('').forEach((d,j) => { if(otps[j]) otps[j].value=d; });
          otps[Math.min(val.length,5)]?.focus();
        } else { inp.value=val; if(val && i<5) otps[i+1].focus(); }
        document.getElementById('verifyBtn').disabled = otps.map(o=>o.value).join('').length !== 6;
      });
      inp.addEventListener('keydown', e => {
        if (e.key==='Backspace' && !inp.value && i>0) { otps[i-1].focus(); otps[i-1].value=''; document.getElementById('verifyBtn').disabled=true; }
        if (e.key==='Enter') doVerify();
      });
    });

    async function doVerify() {
      const code = otps.map(o=>o.value).join('');
      if (code.length !== 6) return;
      const btn = document.getElementById('verifyBtn');
      btn.disabled=true; btn.textContent='Проверяем...';
      hideNotice('n2');
      try {
        const r = await fetch('/api/auth/verify-code', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ email: _email, code, markVerified: true })
        }).then(r=>r.json());
        if (r.ok) { U.go(r.needsOnboarding ? '/signup?step=name' : '/home'); return; }
        showNotice('n2', r.error || 'Неверный код');
        otps.forEach(o=>o.value=''); otps[0]?.focus();
        btn.disabled=false; btn.textContent='Подтвердить';
      } catch { showNotice('n2','Ошибка сети'); btn.disabled=false; btn.textContent='Подтвердить'; }
    }

    document.getElementById('verifyBtn').addEventListener('click', doVerify);
    document.getElementById('resendBtn').addEventListener('click', async () => {
      const btn = document.getElementById('resendBtn');
      btn.disabled=true;
      await sendVerifyCode(_email);
      showNotice('n2','Код отправлен повторно','success');
      otps.forEach(o=>o.value=''); otps[0]?.focus();
      setTimeout(()=>{ btn.disabled=false; hideNotice('n2'); }, 60000);
    });
  })();
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
</body>
</html>
