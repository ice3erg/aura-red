<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>+aura — Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body { padding-bottom: 80px; }
    .chat-overlay{position:fixed;inset:0;background:#050505;z-index:300;display:none;flex-direction:column;}
    .chat-overlay.open{display:flex;}
    .chat-overlay-header{display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;}
    .chat-back{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px 8px;}
    .chat-other-name{font-size:17px;font-weight:700;flex:1;}
    .msg-list{flex:1;overflow-y:auto;padding:12px 0;}
    .msg-input-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0;padding-bottom:max(12px,env(safe-area-inset-bottom));}
    .msg-input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:10px 16px;color:#fff;font:inherit;font-size:14px;outline:none;resize:none;}
    .msg-input::placeholder{color:rgba(255,255,255,.3);}
    .msg-send{background:#ff2b2b;border:none;border-radius:50%;width:40px;height:40px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;}

    .chat-header {
      padding: 20px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-header h1 { font-size: 28px; font-weight: 800; }
    .chat-header .sub { font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 2px; }

    /* TABS */
    .chat-tabs {
      display: flex;
      gap: 4px;
      padding: 0 16px 16px;
    }
    .chat-tab {
      flex: 1;
      padding: 9px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .chat-tab.active {
      background: rgba(255,43,43,0.12);
      border-color: rgba(255,43,43,0.3);
      color: #ff6b6b;
    }

    /* SECTIONS */
    .chat-section { display: none; padding: 0 16px; }
    .chat-section.active { display: block; }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: rgba(255,255,255,0.35);
    }
    .empty-state .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .empty-state p { font-size: 14px; line-height: 1.5; }

    /* SIGNAL CARD */
    .signal-card {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .signal-card:hover { background: rgba(255,255,255,0.07); }

    .signal-ava {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2a1a1a, #1a1a2a);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    .signal-body { flex: 1; min-width: 0; }
    .signal-name { font-size: 15px; font-weight: 700; }
    .signal-track {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .signal-badge {
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .signal-badge.red   { background:rgba(255,43,43,0.15);  color:#ff6b6b; }
    .signal-badge.white { background:rgba(255,255,255,0.07); color:#ccc; }
    .signal-badge.gray  { background:rgba(130,130,130,0.1);  color:#888; }

    /* CHAT LIST */
    .chat-item {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 13px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .chat-item:hover { background: rgba(255,255,255,0.07); }

    .chat-item-ava {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a2a1a, #1a1a2a);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      position: relative;
    }
    .chat-item-ava .online-dot {
      position: absolute;
      bottom: 1px; right: 1px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
      border: 2px solid #050505;
    }

    .chat-item-body { flex: 1; min-width: 0; }
    .chat-item-name { font-size: 15px; font-weight: 700; }
    .chat-item-last {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-item-last.unread { color: rgba(255,255,255,0.75); font-weight: 600; }

    .chat-item-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
      flex-shrink: 0;
    }
    .chat-item-time { font-size: 11px; color: rgba(255,255,255,0.3); }
    .unread-badge {
      background: #ff2b2b;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 999px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px;
    }

    /* SECTION LABEL */
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3);
      font-weight: 700;
      padding: 0 2px 10px;
    }
  </style>
</head>
<body class="red-mode">

  <div class="chat-header">
    <div>
      <h1>Сообщения</h1>
      <div class="sub" id="chatSub">Загрузка...</div>
    </div>
  </div>

  <div class="chat-tabs">
    <button class="chat-tab active" onclick="switchTab('chats')">Чаты</button>
    <button class="chat-tab" onclick="switchTab('signals')">Сигналы <span id="signalCount"></span></button>
  </div>

  <!-- CHATS TAB -->
  <div class="chat-section active" id="tab-chats">
    <div class="section-label">Недавние</div>
    <div id="chatList"></div>
  </div>

  <!-- SIGNALS TAB -->
  <div class="chat-section" id="tab-signals">
    <div class="section-label">Входящие сигналы</div>
    <div id="signalList"></div>
  </div>

  <div class="chat-overlay" id="chatOverlay">
    <div class="chat-overlay-header">
      <button class="chat-back" id="chatBackBtn">←</button>
      <div class="chat-other-name" id="chatOtherName">Чат</div>
    </div>
    <div class="msg-list" id="msgList"></div>
    <div class="msg-input-row">
      <textarea class="msg-input" id="msgInput" placeholder="Сообщение..." rows="1"></textarea>
      <button class="msg-send" id="msgSendBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-link " href="/home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a class="nav-link active" href="/chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Chat</span>
    </a>
    <a class="nav-link " href="/profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Profile</span>
    </a>
</nav>

  <script src="/js/utils.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
