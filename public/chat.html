<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>+aura — Чат</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body { background:#050505; padding-bottom:72px; }

    /* ── Header ─────────────────────────────── */
    .msgs-header {
      padding: 20px 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .msgs-title { font-size: 28px; font-weight: 800; }
    .msgs-sub   { font-size: 13px; color: rgba(255,255,255,.4); margin-top: 3px; }

    .pending-signals {
      margin: 16px 16px 0;
      padding: 13px 15px;
      border-radius: 16px;
      background: rgba(255,43,43,.08);
      border: 1px solid rgba(255,43,43,.2);
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: background .15s;
    }
    .pending-signals:hover { background: rgba(255,43,43,.13); }
    .pending-signals .ps-icon {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,43,43,.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .pending-signals .ps-body { flex: 1; min-width: 0; }
    .pending-signals .ps-title { font-size: 14px; font-weight: 700; color: #ff6b6b; }
    .pending-signals .ps-sub   { font-size: 12px; color: rgba(255,255,255,.45); margin-top: 1px; }
    .pending-signals .ps-badge {
      background: #ff2b2b; color: #fff;
      font-size: 12px; font-weight: 800;
      min-width: 22px; height: 22px;
      border-radius: 99px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 6px; flex-shrink: 0;
    }

    /* ── Chat list ──────────────────────────── */
    .chat-list { padding: 12px 0; }

    .chat-row {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 12px 20px;
      cursor: pointer;
      transition: background .12s;
      position: relative;
    }
    .chat-row:hover { background: rgba(255,255,255,.03); }
    .chat-row:active { background: rgba(255,255,255,.06); }

    .chat-row-ava {
      position: relative;
      flex-shrink: 0;
    }
    .chat-row-ava .online-dot {
      position: absolute; bottom: 1px; right: 1px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
      border: 2px solid #050505;
    }

    .chat-row-body { flex: 1; min-width: 0; }
    .chat-row-name {
      font-size: 15px; font-weight: 700;
      display: flex; align-items: center; gap: 7px;
    }
    .chat-row-vibe {
      font-size: 11px; padding: 2px 7px;
      border-radius: 99px; font-weight: 700;
    }
    .vibe-track  { background:rgba(255,43,43,.15);  color:#ff6b6b; }
    .vibe-artist { background:rgba(255,255,255,.08); color:#ccc; }
    .vibe-vibe   { background:rgba(130,130,130,.1);  color:#888; }

    .chat-row-last {
      font-size: 13px;
      color: rgba(255,255,255,.4);
      margin-top: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-row-last.unread { color: rgba(255,255,255,.8); font-weight: 600; }

    .chat-row-meta {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 5px; flex-shrink: 0;
    }
    .chat-row-time { font-size: 11px; color: rgba(255,255,255,.3); }
    .unread-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ff2b2b;
    }

    .divider { height: 1px; background: rgba(255,255,255,.05); margin: 0 20px; }

    /* ── Empty ──────────────────────────────── */
    .empty-msgs {
      text-align: center;
      padding: 60px 32px;
      color: rgba(255,255,255,.3);
    }
    .empty-msgs .ei { font-size: 48px; margin-bottom: 14px; }
    .empty-msgs p { font-size: 14px; line-height: 1.6; }
    .empty-msgs a {
      display: inline-block; margin-top: 16px;
      padding: 10px 20px; border-radius: 12px;
      background: rgba(255,43,43,.15); color: #ff6b6b;
      border: 1px solid rgba(255,43,43,.25);
      font-size: 13px; font-weight: 700; text-decoration: none;
    }

    /* ── Signals sheet ──────────────────────── */
    .signals-sheet {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(8px);
      display: none; align-items: flex-end; justify-content: center;
      padding: 16px;
    }
    .signals-sheet.open { display: flex; }
    .signals-inner {
      width: 100%; max-width: 440px;
      background: #0e0e12;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      padding: 20px;
      max-height: 70vh;
      overflow-y: auto;
      animation: slideUp .2s cubic-bezier(.34,1.56,.64,1);
    }
    .signals-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .signals-title { font-size: 18px; font-weight: 800; }
    .signals-close {
      background: rgba(255,255,255,.08); border: none;
      color: #fff; width: 30px; height: 30px;
      border-radius: 50%; cursor: pointer; font-size: 16px;
    }

    .sig-card {
      display: flex; align-items: center; gap: 13px;
      padding: 13px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 16px;
      margin-bottom: 10px;
    }
    .sig-body { flex: 1; min-width: 0; }
    .sig-name { font-size: 15px; font-weight: 700; }
    .sig-track { font-size: 12px; color: rgba(255,255,255,.5); margin-top: 2px; white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .sig-actions { display: flex; gap: 7px; margin-top: 10px; }
    .sig-btn {
      flex: 1; padding: 8px; border-radius: 10px;
      font: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; border: none; transition: opacity .15s;
    }
    .sig-btn:active { opacity: .7; }
    .sig-btn.accept { background: rgba(255,43,43,.2); color: #ff6b6b; border: 1px solid rgba(255,43,43,.3); }
    .sig-btn.ignore { background: rgba(255,255,255,.06); color: rgba(255,255,255,.5); border: 1px solid rgba(255,255,255,.08); }

    /* ── Chat dialog ────────────────────────── */
    .chat-dialog {
      position: fixed; inset: 0; z-index: 300;
      background: #050505;
      display: none; flex-direction: column;
    }
    .chat-dialog.open { display: flex; }

    .dlg-header {
      display: flex; align-items: center; gap: 13px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      flex-shrink: 0;
    }
    .dlg-back {
      background: rgba(255,255,255,.08); border: none;
      color: #fff; width: 36px; height: 36px;
      border-radius: 50%; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .dlg-info { flex: 1; min-width: 0; }
    .dlg-name { font-size: 16px; font-weight: 800; }
    .dlg-vibe { font-size: 12px; color: rgba(255,255,255,.4); margin-top: 1px; }
    .dlg-ava  { flex-shrink: 0; }

    .dlg-messages {
      flex: 1; overflow-y: auto;
      padding: 16px 0 8px;
      display: flex; flex-direction: column;
    }

    .msg-bubble {
      max-width: 72%;
      padding: 10px 14px;
      font-size: 14px; line-height: 1.5;
      margin: 3px 16px;
    }
    .msg-bubble.mine {
      align-self: flex-end;
      background: rgba(255,43,43,.22);
      border: 1px solid rgba(255,43,43,.3);
      border-radius: 18px 18px 4px 18px;
      color: #fff;
    }
    .msg-bubble.theirs {
      align-self: flex-start;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px 18px 18px 4px;
      color: rgba(255,255,255,.9);
    }
    .msg-bubble.system {
      align-self: center;
      background: transparent;
      border: none;
      color: rgba(255,255,255,.35);
      font-size: 12px;
      padding: 4px 16px;
      max-width: 90%;
      text-align: center;
    }
    .msg-time {
      font-size: 10px;
      margin-top: 4px;
      opacity: .5;
    }

    .dlg-input-row {
      display: flex; gap: 10px;
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,.06);
      flex-shrink: 0;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }
    .dlg-input {
      flex: 1;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 22px;
      padding: 11px 16px;
      color: #fff; font: inherit; font-size: 14px;
      outline: none; resize: none;
      max-height: 120px;
    }
    .dlg-input::placeholder { color: rgba(255,255,255,.3); }
    .dlg-send {
      width: 42px; height: 42px;
      background: #ff2b2b; border: none; border-radius: 50%;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      align-self: flex-end;
      transition: transform .1s;
    }
    .dlg-send:active { transform: scale(.93); }

    @keyframes slideUp { from{transform:translateY(24px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes typingDot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30%            { transform: translateY(-4px); opacity: 1; }
    }
  </style>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#060608">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="+aura">
  <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body class="red-mode">

  <!-- Main chat list -->
  <div class="msgs-header">
    <div>
      <div class="msgs-title">Сообщения</div>
      <div class="msgs-sub" id="chatSub">Загрузка...</div>
    </div>
  </div>

  <div id="pendingSignals" class="pending-signals" style="display:none;" onclick="openSignalsSheet()">
    <div class="ps-icon">📡</div>
    <div class="ps-body">
      <div class="ps-title">Входящие сигналы</div>
      <div class="ps-sub" id="pendingSubText">Кто-то хочет познакомиться</div>
    </div>
    <div class="ps-badge" id="pendingCount">0</div>
  </div>

  <!-- Отправленные сигналы -->
  <div id="sentSignalsBanner" style="display:none;margin:8px 16px 0;padding:13px 15px;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);cursor:pointer;display:none;align-items:center;gap:12px;" onclick="openSentSignalsSheet()">
    <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">✉️</div>
    <div style="flex:1;min-width:0;">
      <div style="font-size:14px;font-weight:700;color:rgba(255,255,255,0.8);">Отправленные сигналы</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:1px;" id="sentSubText">Ожидают ответа</div>
    </div>
    <div id="sentCount" style="background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);font-size:12px;font-weight:800;min-width:22px;height:22px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 6px;">0</div>
  </div>

  <!-- Sent Signals sheet -->
  <div class="signals-sheet" id="sentSignalsSheet" onclick="if(event.target===this) closeSentSignalsSheet()">
    <div class="signals-inner">
      <div class="signals-header">
        <div class="signals-title">Отправленные сигналы</div>
        <button class="signals-close" onclick="closeSentSignalsSheet()">✕</button>
      </div>
      <div id="sentSignalList"></div>
    </div>
  </div>

  <div class="chat-list" id="chatList">
    <div class="empty-msgs">
      <div class="ei">💬</div>
      <p>Загрузка...</p>
    </div>
  </div>

  <!-- Signals sheet -->
  <div class="signals-sheet" id="signalsSheet" onclick="e => { if(e.target===this) closeSignalsSheet(); }">
    <div class="signals-inner">
      <div class="signals-header">
        <div class="signals-title">Сигналы</div>
        <button class="signals-close" onclick="closeSignalsSheet()">✕</button>
      </div>
      <div id="signalList"></div>
    </div>
  </div>

  <!-- Chat dialog -->
  <div class="chat-dialog" id="chatDialog">
    <div class="dlg-header">
      <button class="dlg-back" id="dlgBack">←</button>
      <div class="dlg-info">
        <div class="dlg-name" id="dlgName">—</div>
        <div class="dlg-vibe" id="dlgVibe"></div>
      </div>
      <div class="dlg-ava" id="dlgAva"></div>
      <svg id="dlgArrow" style="display:none;flex-shrink:0;margin-left:2px;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
    </div>
    <div class="dlg-messages" id="dlgMessages"></div>

    <!-- Typing indicator -->
    <div id="typingIndicator" style="display:none;padding:8px 16px;align-items:center;gap:8px;">
      <div style="display:flex;gap:4px;align-items:center;">
        <span style="width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.3);animation:typingDot 1.2s ease-in-out infinite;"></span>
        <span style="width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.3);animation:typingDot 1.2s 0.2s ease-in-out infinite;"></span>
        <span style="width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.3);animation:typingDot 1.2s 0.4s ease-in-out infinite;"></span>
      </div>
      <span style="font-size:12px;color:rgba(255,255,255,0.3);font-weight:600;">печатает...</span>
    </div>

    <div class="dlg-input-row">
      <textarea class="dlg-input" id="dlgInput" placeholder="Сообщение..." rows="1"></textarea>
      <button class="dlg-send" id="dlgSend">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-link" href="/home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><path d="M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M17.66 6.34l-2.12 2.12M6.34 17.66l-2.12 2.12"/></svg>
      <span>Радар</span>
    </a>
    <a class="nav-link active" href="/chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Чат</span>
    </a>
    <a class="nav-link" href="/profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Профиль</span>
    </a>
  </nav>

  <script src="/js/utils.js"></script>
  <script src="/js/chat.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
