<!doctype html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo — +aura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
<style id="native-feel">
  * {
    -webkit-tap-highlight-color: transparent !important;
    -webkit-touch-callout: none;
  }
  html, body {
    overscroll-behavior: none;
    -webkit-overflow-scrolling: touch;
  }
  /* Текст не выделяется (как в нативных приложениях), кроме полей ввода */
  body { -webkit-user-select: none; user-select: none; }
  input, textarea, [contenteditable] { -webkit-user-select: text; user-select: text; }
  /* Кнопки и интерактив — мгновенный отклик без 300ms задержки */
  a, button, .nav-link, [role="button"], [onclick] { touch-action: manipulation; }
</style>
</head>
<body>
  <main class="center-shell">
    <section class="card auth-card stack-lg">
      <div class="logo"><span class="logo-dot"></span> +aura demo</div>
      <div class="stack">
        <div class="eyebrow">Prototype route</div>
        <h2>Old flows live here.</h2>
        <p class="lead">Use this page as a safe sandbox for experiments while the new app shell stays stable.</p>
      </div>
      <div class="stack">
        <a class="btn btn-primary btn-full" href="/login">Enter app</a>
        <a class="btn btn-secondary btn-full" href="/spotify/login">Spotify demo route</a>
        <a class="btn btn-ghost btn-full" href="/">Back to landing</a>
      </div>
    </section>
  </main>
</body>
</html>
