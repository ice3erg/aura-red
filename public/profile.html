<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Профиль — +aura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #ff2b2b;
      --red-dim: rgba(255,43,43,0.15);
      --red-glow: rgba(255,43,43,0.4);
      --bg: #060608;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.07);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.45);
      --faint: rgba(255,255,255,0.12);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    body { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }

    /* ── Ambient glow ── */
    .bg-glow {
      position: fixed; top: -10%; left: 50%; transform: translateX(-50%);
      width: 500px; height: 300px;
      background: radial-gradient(ellipse, rgba(255,43,43,0.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .page {
      position: relative; z-index: 1;
      max-width: 480px; margin: 0 auto;
      padding: 0 0 32px;
    }

    /* ── Cover photo ── */
    .cover-wrap {
      position: relative;
      height: 200px;
      background: #0d0d12;
      overflow: hidden;
      cursor: pointer;
    }
    .cover-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }
    .cover-img.visible { display: block; }
    .cover-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px; font-weight: 600;
      transition: background 0.2s;
    }
    .cover-placeholder svg { opacity: 0.3; }
    .cover-wrap:hover .cover-placeholder { background: rgba(255,255,255,0.02); }
    .cover-edit-badge {
      position: absolute; bottom: 12px; right: 12px;
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 99px;
      background: rgba(6,6,8,0.8); border: 1px solid var(--border);
      font-size: 11px; font-weight: 700; color: var(--muted);
      backdrop-filter: blur(12px);
      pointer-events: none;
    }

    /* ── Avatar floating ── */
    .avatar-section {
      position: relative;
      padding: 0 20px;
      margin-top: -44px;
      margin-bottom: 4px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .avatar-wrap {
      position: relative;
      width: 88px; height: 88px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .avatar-img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--bg);
      display: none;
      background: #1a1a22;
    }
    .avatar-img.visible { display: block; }
    .avatar-ph {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: #1a1a22;
      border: 3px solid var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    .avatar-edit-btn {
      position: absolute; bottom: 2px; right: 2px;
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--red);
      border: 2px solid var(--bg);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    .avatar-actions {
      display: flex; gap: 8px; align-items: center;
      padding-bottom: 4px;
    }
    .music-link-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-size: 12px; font-weight: 700;
      text-decoration: none; cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .music-link-btn:hover { color: var(--text); border-color: var(--faint); }
    .music-link-btn.connected { color: var(--red); border-color: rgba(255,43,43,0.2); background: var(--red-dim); }

    /* ── Name block ── */
    .name-block {
      padding: 12px 20px 0;
    }
    .name-display {
      font-size: 24px; font-weight: 900; letter-spacing: -0.4px;
      line-height: 1.1;
    }
    .name-sub {
      font-size: 13px; color: var(--muted);
      margin-top: 4px; display: flex; align-items: center; gap: 8px;
    }
    .name-sub-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); }

    /* ── Stats row ── */
    .stats-row {
      display: flex; gap: 0;
      margin: 16px 20px 0;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .stat-item {
      flex: 1; padding: 14px 12px;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat-item:last-child { border-right: none; }
    .stat-val { font-size: 20px; font-weight: 900; letter-spacing: -0.3px; }
    .stat-val.red { color: var(--red); }
    .stat-lbl { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

    /* ── Section ── */
    .section {
      margin: 16px 20px 0;
    }
    .section-title {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); margin-bottom: 10px; padding: 0 2px;
    }

    /* ── Form fields ── */
    .field-group {
      display: flex; flex-direction: column; gap: 8px;
    }
    .field-row {
      display: flex; gap: 8px;
    }
    .field-row .field-wrap { flex: 1; }

    .field-wrap {
      position: relative;
    }
    .field-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted);
      position: absolute; top: 11px; left: 15px;
      pointer-events: none; transition: color 0.2s;
    }
    .field-input {
      width: 100%;
      padding: 26px 15px 10px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font: 700 15px/1.3 'Inter', system-ui, sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
      resize: none;
    }
    .field-input::placeholder { color: transparent; }
    .field-input:focus {
      border-color: rgba(255,43,43,0.35);
      background: rgba(255,43,43,0.04);
    }
    .field-input:focus + .field-label,
    .field-input.has-value + .field-label { color: var(--red); }

    textarea.field-input {
      min-height: 90px;
      padding-top: 28px;
    }

    /* ── Music connections ── */
    .music-card {
      display: flex; align-items: center; gap: 13px;
      padding: 14px 16px;
      border-radius: 14px;
      background: var(--surface); border: 1px solid var(--border);
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }
    .music-card.connected { border-color: rgba(255,43,43,0.2); background: rgba(255,43,43,0.04); }
    .music-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 18px;
    }
    .music-icon.lastfm { background: rgba(188,0,0,0.15); }
    .music-icon.spotify { background: rgba(29,185,84,0.12); }
    .music-info { flex: 1; min-width: 0; }
    .music-name { font-size: 14px; font-weight: 700; }
    .music-status { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .music-status.connected { color: var(--red); }
    .music-action {
      padding: 7px 14px; border-radius: 10px;
      font: 700 12px/1 'Inter', system-ui, sans-serif;
      cursor: pointer; border: none; white-space: nowrap;
      transition: opacity 0.15s;
    }
    .music-action:active { opacity: 0.7; }
    .music-action.connect { background: var(--red); color: #fff; }
    .music-action.disconnect { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }

    /* ── Save button ── */
    .save-btn {
      width: 100%; padding: 16px;
      border-radius: 16px;
      background: var(--red); color: #fff;
      font: 800 15px/1 'Inter', system-ui, sans-serif;
      border: none; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: -0.1px;
    }
    .save-btn:hover { opacity: 0.92; }
    .save-btn:active { transform: scale(0.98); opacity: 0.85; }
    .save-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Notice ── */
    .notice {
      padding: 12px 15px; border-radius: 12px;
      font-size: 13px; font-weight: 600;
      display: none;
    }
    .notice.visible { display: block; }
    .notice.error { background: rgba(255,43,43,0.1); border: 1px solid rgba(255,43,43,0.25); color: #ff8080; }
    .notice.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); color: #86efac; }

    /* ── Danger zone ── */
    .danger-btn {
      width: 100%; padding: 14px;
      border-radius: 14px;
      background: transparent; color: rgba(255,80,80,0.7);
      border: 1px solid rgba(255,43,43,0.15);
      font: 700 13px/1 'Inter', system-ui, sans-serif;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .danger-btn:hover { background: rgba(255,43,43,0.08); color: var(--red); }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(64px + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: rgba(6,6,8,0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; align-items: stretch; z-index: 100;
    }
    .nav-link {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      text-decoration: none; color: rgba(255,255,255,0.3);
      font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase; transition: color 0.2s;
    }
    .nav-link:hover  { color: rgba(255,255,255,0.6); }
    .nav-link.active { color: var(--red); }
    .nav-link svg { width: 22px; height: 22px; }
    .nav-link.active svg { filter: drop-shadow(0 0 5px var(--red-glow)); }

    /* ── Animations ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .cover-wrap   { animation: fadeInUp 0.3s ease both; }
    .avatar-section { animation: fadeInUp 0.3s 0.05s ease both; }
    .name-block   { animation: fadeInUp 0.3s 0.08s ease both; }
    .stats-row    { animation: fadeInUp 0.3s 0.11s ease both; }
    .section      { animation: fadeInUp 0.3s 0.14s ease both; }

    #coverInput, #avatarInput { display: none; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="page">

    <!-- Cover photo -->
    <div class="cover-wrap" id="coverWrap" onclick="document.getElementById('coverInput').click()">
      <img class="cover-img" id="coverImg" src="" alt="" />
      <div class="cover-placeholder" id="coverPlaceholder">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        Добавить обложку
      </div>
      <div class="cover-edit-badge">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Изменить
      </div>
    </div>
    <input type="file" id="coverInput" accept="image/*" />

    <!-- Avatar + actions -->
    <div class="avatar-section">
      <div class="avatar-wrap" onclick="document.getElementById('avatarInput').click()">
        <img class="avatar-img" id="avatarImg" src="" alt="" />
        <div class="avatar-ph" id="avatarPh">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
        <div class="avatar-edit-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
        </div>
      </div>
      <input type="file" id="avatarInput" accept="image/*" />

      <div class="avatar-actions">
      </div>
    </div>

    <!-- Name display -->
    <div class="name-block">
      <div class="name-display" id="nameDisplay">—</div>
      <div class="name-sub">
        <span id="cityDisplay"></span>
        <span class="name-sub-dot" id="ageDot" style="display:none"></span>
        <span id="ageDisplay"></span>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-val red" id="statSignals">0</div>
        <div class="stat-lbl">Сигналы</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="statChats">0</div>
        <div class="stat-lbl">Чаты</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="statVibe">—</div>
        <div class="stat-lbl">Вайб</div>
      </div>
    </div>

    <!-- Edit fields -->
    <div class="section">
      <div class="section-title">Личное</div>
      <div class="field-group">
        <div class="field-row">
          <div class="field-wrap" style="flex:2">
            <input class="field-input" id="fieldName" type="text" maxlength="40" autocomplete="off" />
            <span class="field-label">Имя</span>
          </div>
          <div class="field-wrap" style="flex:1">
            <input class="field-input" id="fieldAge" type="number" min="13" max="99" />
            <span class="field-label">Возраст</span>
          </div>
        </div>
        <div class="field-wrap">
          <input class="field-input" id="fieldCity" type="text" maxlength="60" autocomplete="off" />
          <span class="field-label">Город</span>
        </div>
        <div class="field-wrap">
          <textarea class="field-input" id="fieldBio" maxlength="300" rows="3"></textarea>
          <span class="field-label">О себе</span>
        </div>
      </div>
    </div>

    <!-- Music connections -->
    <div class="section">
      <div class="section-title">Музыка</div>
      <div class="music-card" id="lastfmCard">
        <div class="music-icon lastfm">🎵</div>
        <div class="music-info">
          <div class="music-name">Last.fm</div>
          <div class="music-status" id="lastfmStatus">Не подключено</div>
        </div>
        <button class="music-action connect" id="lastfmBtn">Подключить</button>
      </div>
      <!-- Last.fm username input (скрыт когда подключено) -->
      <div id="lastfmInputWrap" style="display:none;margin-top:-2px;margin-bottom:8px;padding:12px 14px;border-radius:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;">Last.fm Username</div>
        <div style="display:flex;gap:8px;">
          <input id="lastfmUsernameField" type="text" placeholder="твой_username" autocomplete="off" autocorrect="off" autocapitalize="none"
            style="flex:1;padding:10px 13px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#fff;font:600 14px/1 Inter,sans-serif;outline:none;" />
          <button id="lastfmSaveBtn" style="padding:10px 16px;border-radius:10px;background:var(--red);color:#fff;border:none;font:700 13px/1 Inter,sans-serif;cursor:pointer;white-space:nowrap;">Сохранить</button>
        </div>
      </div>
      <div class="music-card" id="spotifyCard">
        <div class="music-icon spotify">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#1DB954"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424c-.18.295-.563.387-.857.207-2.35-1.435-5.305-1.76-8.786-.963-.335.077-.67-.133-.746-.469-.077-.336.132-.67.469-.746 3.809-.87 7.077-.496 9.713 1.115.293.18.386.563.207.856zm1.223-2.722c-.226.367-.706.482-1.072.257-2.687-1.652-6.785-2.131-9.965-1.166-.413.127-.848-.105-.975-.517-.127-.413.104-.848.517-.975 3.632-1.102 8.147-.568 11.238 1.329.366.226.48.707.257 1.072zm.105-2.835C14.692 8.95 9.375 8.775 6.297 9.71c-.493.15-1.016-.129-1.165-.623-.148-.495.13-1.016.624-1.165 3.552-1.077 9.457-.869 13.19 1.37.448.267.595.847.328 1.294-.266.448-.846.595-1.293.328z"/></svg>
        </div>
        <div class="music-info">
          <div class="music-name">Spotify</div>
          <div class="music-status" id="spotifyStatus">Не подключено</div>
        </div>
        <button class="music-action connect" id="spotifyBtn">Подключить</button>
      </div>
    </div>

    <!-- Notice -->
    <div class="section">
      <div class="notice" id="profileNotice"></div>
    </div>

    <!-- Save -->
    <div class="section">
      <button class="save-btn" id="saveBtn">Сохранить профиль</button>
    </div>

    <!-- Danger -->
    <div class="section">
      <button class="danger-btn" id="logoutBtn">Выйти из аккаунта</button>
    </div>

  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="nav-link" href="/home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a class="nav-link" href="/chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Chat</span>
    </a>
    <a class="nav-link active" href="/profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Profile</span>
    </a>
  </nav>

  <script src="/js/utils.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
