<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Профиль — +aura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --red:#ff2b2b;--red-dim:rgba(255,43,43,0.15);--red-glow:rgba(255,43,43,0.4);
      --bg:#060608;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);
      --text:#fff;--muted:rgba(255,255,255,0.45);--faint:rgba(255,255,255,0.12);
    }
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    body{padding-bottom:calc(80px + env(safe-area-inset-bottom))}

    .bg-glow{position:fixed;top:-10%;left:50%;transform:translateX(-50%);width:500px;height:300px;background:radial-gradient(ellipse,rgba(255,43,43,0.07) 0%,transparent 70%);pointer-events:none;z-index:0}
    .page{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 0 32px}

    /* ── Photo collage header ── */
    .collage-wrap{position:relative;height:220px;overflow:hidden;background:#0d0d12}
    .collage-grid{width:100%;height:100%;display:grid;gap:2px}
    .collage-grid.n0{background:linear-gradient(135deg,#0d0d16,#1a0a1a)}
    .collage-grid.n1{grid-template-columns:1fr}
    .collage-grid.n2{grid-template-columns:1fr 1fr}
    .collage-grid.n3{grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr}
    .collage-grid.n4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
    .collage-grid.n5{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr}
    .collage-grid.n6{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr}
    .collage-cell{overflow:hidden;background:#1a1a22}
    .collage-cell.span2{grid-row:span 2}
    .collage-cell img{width:100%;height:100%;object-fit:cover;display:block}
    .collage-empty{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:background 0.2s}
    .collage-empty:hover{background:rgba(255,255,255,0.02)}
    .collage-empty svg{opacity:0.25}
    .collage-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,6,8,1) 0%,rgba(6,6,8,0.2) 55%,transparent 100%);pointer-events:none}
    .collage-edit{position:absolute;top:12px;right:12px;display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:99px;background:rgba(6,6,8,0.75);border:1px solid rgba(255,255,255,0.1);font-size:11px;font-weight:700;color:rgba(255,255,255,0.6);backdrop-filter:blur(12px);cursor:pointer;transition:color 0.2s}
    .collage-edit:hover{color:#fff}

    /* ── Avatar row ── */
    .avatar-row{position:relative;padding:0 20px;margin-top:-46px;margin-bottom:0;display:flex;align-items:flex-end;justify-content:space-between}
    .avatar-wrap{position:relative;width:90px;height:90px;flex-shrink:0;cursor:pointer}
    .avatar-img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid var(--bg);display:none;background:#1a1a22}
    .avatar-img.visible{display:block}
    .avatar-ph{width:100%;height:100%;border-radius:50%;background:#1a1a22;border:3px solid var(--bg);display:flex;align-items:center;justify-content:center}
    .avatar-edit-btn{position:absolute;bottom:2px;right:2px;width:26px;height:26px;border-radius:50%;background:var(--red);border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer}

    /* Лучи вокруг аватара когда играет трек */
    .avatar-rays{position:absolute;inset:-12px;border-radius:50%;pointer-events:none;display:none}
    .avatar-rays.playing{display:block}
    .ray{position:absolute;width:2px;border-radius:99px;background:linear-gradient(to top,var(--red),transparent);transform-origin:bottom center;bottom:50%;left:50%;margin-left:-1px;opacity:0}
    .avatar-rays.playing .ray{animation:rayPulse 1.8s ease-in-out infinite}
    @keyframes rayPulse{0%,100%{opacity:0;height:8px}50%{opacity:0.7;height:14px}}

    .avatar-side{display:flex;flex-direction:column;align-items:flex-end;gap:8px;padding-bottom:6px}
    .share-link-btn{display:flex;align-items:center;gap:6px;padding:8px 13px;border-radius:12px;background:var(--surface);border:1px solid var(--border);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:color 0.2s,border-color 0.2s;text-decoration:none;white-space:nowrap}
    .share-link-btn:hover{color:var(--text);border-color:var(--faint)}

    /* ── Name block ── */
    .name-block{padding:12px 20px 0}
    .name-display{font-size:24px;font-weight:900;letter-spacing:-0.4px;line-height:1.1}
    .name-sub{font-size:13px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

    /* ── Aura score ── */
    .aura-block{margin:14px 20px 0;padding:16px 18px;border-radius:20px;background:linear-gradient(135deg,rgba(255,43,43,0.1) 0%,rgba(255,43,43,0.04) 100%);border:1px solid rgba(255,43,43,0.18);display:flex;align-items:center;gap:14px}
    .aura-icon{font-size:28px;line-height:1;flex-shrink:0}
    .aura-info{flex:1;min-width:0}
    .aura-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,43,43,0.7);margin-bottom:3px}
    .aura-score{font-size:26px;font-weight:900;letter-spacing:-0.5px;color:#fff;line-height:1}
    .aura-rank{font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px}
    .aura-bar-wrap{flex:1;display:flex;flex-direction:column;gap:5px;align-items:flex-end}
    .aura-bar-bg{width:80px;height:6px;border-radius:99px;background:rgba(255,255,255,0.08)}
    .aura-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--red),rgba(255,100,100,0.8));transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1)}
    .aura-next{font-size:10px;color:rgba(255,255,255,0.3);font-weight:600}

    /* ── Stats row ── */
    .stats-row{display:flex;gap:0;margin:12px 20px 0;border-radius:16px;overflow:hidden;border:1px solid var(--border);background:var(--surface)}
    .stat-item{flex:1;padding:13px 10px;text-align:center;border-right:1px solid var(--border)}
    .stat-item:last-child{border-right:none}
    .stat-val{font-size:19px;font-weight:900;letter-spacing:-0.3px}
    .stat-val.red{color:var(--red)}
    .stat-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px}

    /* ── Ticker (бегущая строка) ── */
    .ticker-section{margin:16px 20px 0}
    .ticker-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:8px;padding:0 2px}
    .ticker-wrap{overflow:hidden;border-radius:12px;background:var(--surface);border:1px solid var(--border);padding:10px 0;position:relative}
    .ticker-wrap::before,.ticker-wrap::after{content:'';position:absolute;top:0;bottom:0;width:32px;z-index:2;pointer-events:none}
    .ticker-wrap::before{left:0;background:linear-gradient(to right,rgba(6,6,10,1),transparent)}
    .ticker-wrap::after{right:0;background:linear-gradient(to left,rgba(6,6,10,1),transparent)}
    .ticker-track{display:flex;gap:0;width:max-content;animation:ticker 18s linear infinite}
    .ticker-track:hover{animation-play-state:paused}
    @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    .ticker-item{display:flex;align-items:center;gap:8px;padding:0 16px;flex-shrink:0;white-space:nowrap}
    .ticker-cover{width:28px;height:28px;border-radius:6px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,0.08)}
    .ticker-cover-ph{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .ticker-text{font-size:13px;font-weight:700;color:rgba(255,255,255,0.75)}
    .ticker-artist{font-size:12px;color:var(--muted);margin-left:4px}
    .ticker-sep{color:rgba(255,255,255,0.15);margin:0 4px;font-size:16px}

    /* ── Section ── */
    .section{margin:16px 20px 0}
    .section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:10px;padding:0 2px}

    /* ── Form fields ── */
    .field-group{display:flex;flex-direction:column;gap:8px}
    .field-row{display:flex;gap:8px}
    .field-row .field-wrap{flex:1}
    .field-wrap{position:relative}
    .field-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);position:absolute;top:11px;left:15px;pointer-events:none;transition:color 0.2s}
    .field-input{width:100%;padding:26px 15px 10px;border-radius:14px;background:var(--surface);border:1px solid var(--border);color:var(--text);font:700 15px/1.3 'Inter',system-ui,sans-serif;outline:none;transition:border-color 0.2s,background 0.2s;-webkit-appearance:none;resize:none}
    .field-input::placeholder{color:transparent}
    .field-input:focus{border-color:rgba(255,43,43,0.35);background:rgba(255,43,43,0.04)}
    .field-input:focus+.field-label,.field-input.has-value+.field-label{color:var(--red)}
    textarea.field-input{min-height:90px;padding-top:28px}

    /* ── Music cards ── */
    .music-card{display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:14px;background:var(--surface);border:1px solid var(--border);margin-bottom:8px;transition:border-color 0.2s}
    .music-card.connected{border-color:rgba(255,43,43,0.2);background:rgba(255,43,43,0.04)}
    .music-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
    .music-icon.lastfm{background:rgba(188,0,0,0.15)}
    .music-icon.spotify{background:rgba(29,185,84,0.12)}
    .music-info{flex:1;min-width:0}
    .music-name{font-size:13px;font-weight:700}
    .music-status{font-size:12px;color:var(--muted);margin-top:1px}
    .music-status.connected{color:var(--red)}
    .music-action{padding:7px 13px;border-radius:10px;font:700 12px/1 'Inter',system-ui,sans-serif;cursor:pointer;border:none;white-space:nowrap;transition:opacity 0.15s}
    .music-action:active{opacity:0.7}
    .music-action.connect{background:var(--red);color:#fff}
    .music-action.disconnect{background:var(--surface);color:var(--muted);border:1px solid var(--border)}

    /* ── Buttons ── */
    .save-btn{width:100%;padding:16px;border-radius:16px;background:var(--red);color:#fff;font:800 15px/1 'Inter',system-ui,sans-serif;border:none;cursor:pointer;transition:opacity 0.15s,transform 0.1s;letter-spacing:-0.1px}
    .save-btn:hover{opacity:0.92}
    .save-btn:active{transform:scale(0.98);opacity:0.85}
    .save-btn:disabled{opacity:0.4;cursor:default}

    .notice{padding:12px 15px;border-radius:12px;font-size:13px;font-weight:600;display:none}
    .notice.visible{display:block}
    .notice.error{background:rgba(255,43,43,0.1);border:1px solid rgba(255,43,43,0.25);color:#ff8080}
    .notice.success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);color:#86efac}

    .danger-btn{width:100%;padding:14px;border-radius:14px;background:transparent;color:rgba(255,80,80,0.7);border:1px solid rgba(255,43,43,0.15);font:700 13px/1 'Inter',system-ui,sans-serif;cursor:pointer;transition:background 0.2s,color 0.2s}
    .danger-btn:hover{background:rgba(255,43,43,0.08);color:var(--red)}

    /* ── Bottom nav ── */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(64px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:rgba(6,6,8,0.92);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:100}
    .nav-link{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-decoration:none;color:rgba(255,255,255,0.3);font-size:10px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;transition:color 0.2s;position:relative}
    .nav-link:hover{color:rgba(255,255,255,0.6)}
    .nav-link.active{color:var(--red)}
    .nav-link svg{width:22px;height:22px}
    .nav-link.active svg{filter:drop-shadow(0 0 5px var(--red-glow))}

    @keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .collage-wrap{animation:fadeInUp 0.3s ease both}
    .avatar-row{animation:fadeInUp 0.3s 0.05s ease both}
    .name-block{animation:fadeInUp 0.3s 0.08s ease both}
    .aura-block{animation:fadeInUp 0.3s 0.1s ease both}
    .stats-row{animation:fadeInUp 0.3s 0.12s ease both}
    .ticker-section{animation:fadeInUp 0.3s 0.14s ease both}
    .section{animation:fadeInUp 0.3s 0.16s ease both}

    #coverInput,#avatarInput,#photoInput{display:none}
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="page">

    <!-- Photo collage -->
    <div class="collage-wrap">
      <div class="collage-grid n0" id="collageGrid">
        <div class="collage-empty" onclick="document.getElementById('photoInput').click()">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          Добавь фото для коллажа
        </div>
      </div>
      <div class="collage-overlay"></div>
      <button class="collage-edit" onclick="document.getElementById('photoInput').click()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
        Фото
      </button>
    </div>
    <input type="file" id="photoInput" accept="image/*" multiple />
    <input type="file" id="avatarInput" accept="image/*" />

    <!-- Avatar + share -->
    <div class="avatar-row">
      <div class="avatar-wrap" onclick="document.getElementById('avatarInput').click()">
        <!-- Лучи когда играет трек -->
        <div class="avatar-rays" id="avatarRays">
          <div class="ray" style="transform:rotate(0deg) translateX(-50%);animation-delay:0s"></div>
          <div class="ray" style="transform:rotate(45deg) translateX(-50%);animation-delay:0.22s"></div>
          <div class="ray" style="transform:rotate(90deg) translateX(-50%);animation-delay:0.44s"></div>
          <div class="ray" style="transform:rotate(135deg) translateX(-50%);animation-delay:0.66s"></div>
          <div class="ray" style="transform:rotate(180deg) translateX(-50%);animation-delay:0.88s"></div>
          <div class="ray" style="transform:rotate(225deg) translateX(-50%);animation-delay:1.1s"></div>
          <div class="ray" style="transform:rotate(270deg) translateX(-50%);animation-delay:1.32s"></div>
          <div class="ray" style="transform:rotate(315deg) translateX(-50%);animation-delay:1.54s"></div>
        </div>
        <img class="avatar-img" id="avatarImg" src="" alt="" />
        <div class="avatar-ph" id="avatarPh">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
        <div class="avatar-edit-btn">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
        </div>
      </div>

      <div class="avatar-side">
        <button class="share-link-btn" id="shareBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Мой профиль
        </button>
      </div>
    </div>

    <!-- Name -->
    <div class="name-block">
      <div class="name-display" id="nameDisplay">—</div>
      <div class="name-sub">
        <span id="cityDisplay"></span>
        <span id="ageDisplay"></span>
      </div>
    </div>

    <!-- Aura score -->
    <div class="aura-block">
      <div class="aura-icon">✦</div>
      <div class="aura-info">
        <div class="aura-label">Аура</div>
        <div class="aura-score" id="auraScore">0</div>
        <div class="aura-rank" id="auraRank">Начинающий</div>
      </div>
      <div class="aura-bar-wrap">
        <div class="aura-bar-bg">
          <div class="aura-bar-fill" id="auraBarFill" style="width:0%"></div>
        </div>
        <div class="aura-next" id="auraNext">0 до следующего</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-val red" id="statSignals">0</div>
        <div class="stat-lbl">Сигналы</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="statChats">0</div>
        <div class="stat-lbl">Чаты</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="statDays">0</div>
        <div class="stat-lbl">Дней</div>
      </div>
    </div>

    <!-- Ticker: недавно слушал -->
    <div class="ticker-section" id="tickerSection" style="display:none">
      <div class="ticker-label">Недавно слушал</div>
      <div class="ticker-wrap">
        <div class="ticker-track" id="tickerTrack"></div>
      </div>
    </div>

    <!-- Edit fields -->
    <div class="section">
      <div class="section-title">Личное</div>
      <div class="field-group">
        <div class="field-row">
          <div class="field-wrap" style="flex:2">
            <input class="field-input" id="fieldName" type="text" maxlength="40" autocomplete="off" />
            <span class="field-label">Имя</span>
          </div>
          <div class="field-wrap" style="flex:1">
            <input class="field-input" id="fieldAge" type="number" min="13" max="99" />
            <span class="field-label">Возраст</span>
          </div>
        </div>
        <div class="field-wrap">
          <input class="field-input" id="fieldCity" type="text" maxlength="60" autocomplete="off" />
          <span class="field-label">Город</span>
        </div>
        <div class="field-wrap">
          <textarea class="field-input" id="fieldBio" maxlength="300" rows="3"></textarea>
          <span class="field-label">О себе</span>
        </div>
      </div>
    </div>

    <!-- Music -->
    <div class="section">
      <div class="section-title">Музыка</div>
      <div class="music-card" id="lastfmCard">
        <div class="music-icon lastfm">🎵</div>
        <div class="music-info">
          <div class="music-name">Last.fm</div>
          <div class="music-status" id="lastfmStatus">Не подключено</div>
        </div>
        <button class="music-action connect" id="lastfmBtn">Подключить</button>
      </div>
      <div id="lastfmInputWrap" style="display:none;margin-top:-2px;margin-bottom:8px;padding:12px 14px;border-radius:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;">Last.fm Username</div>
        <div style="display:flex;gap:8px;">
          <input id="lastfmUsernameField" type="text" placeholder="твой_username" autocomplete="off" autocorrect="off" autocapitalize="none"
            style="flex:1;padding:10px 13px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#fff;font:600 14px/1 Inter,sans-serif;outline:none;" />
          <button id="lastfmSaveBtn" style="padding:10px 16px;border-radius:10px;background:var(--red);color:#fff;border:none;font:700 13px/1 Inter,sans-serif;cursor:pointer;white-space:nowrap;">Сохранить</button>
        </div>
      </div>
      <div class="music-card" id="spotifyCard">
        <div class="music-icon spotify">
