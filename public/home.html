<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Главная — +aura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="red-mode">
  <main class="app-shell">
    <section class="top-card">
      <div class="top-row">
        <div style="display:flex;align-items:center;gap:14px;">
          <div id="homeAvatarWrap" style="flex-shrink:0;">
            <img id="homeAvatar" src="" alt="" style="width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid #2a2a35;display:none;" />
            <div id="homeAvatarPlaceholder" style="width:52px;height:52px;border-radius:50%;background:#1a1a22;border:2px solid #2a2a35;display:flex;align-items:center;justify-content:center;">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7a7a85" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
              </svg>
            </div>
          </div>
          <div>
            <div class="small-label">+aura</div>
            <h1 id="homeName" style="margin:2px 0 2px;">Пользователь</h1>
            <p id="homeCity" class="muted-text" style="margin:0;">Город не указан</p>
          </div>
        </div>
        <button id="logoutBtn" class="ghost-btn" style="min-height:40px;padding:0 14px;font-size:13px;">Выйти</button>
      </div>
    </section>

    <section class="card">
      <div id="trackEmptyState">
        <h2 id="spotifyBlockTitle">Spotify не подключён</h2>
        <p id="spotifyBlockText" class="muted-text">
          Подключи Spotify, чтобы активировать музыкальный сигнал.
        </p>
        <a id="spotifyAction" class="primary-btn text-center" href="/connect-music">Подключить Spotify</a>
      </div>

     <div id="trackCard" class="track-card hidden">
  <div class="track-card__inner">
    <div class="track-card__art-wrap">
      <img id="trackImage" class="track-card__art" src="" alt="Обложка трека" />
      <div class="track-card__art-glow"></div>
    </div>
    <div class="track-card__body">
      <div class="track-card__status">
        <span class="track-card__dot"></span>
        Сейчас играет
      </div>
      <div class="track-card__name" id="trackName">Название трека</div>
      <div class="track-card__artists" id="trackArtists">Исполнитель</div>
 
      <div class="player-progress-wrap">
        <div class="player-progress-track">
          <input
            id="trackProgress"
            class="player-progress"
            type="range"
            min="0"
            max="100"
            value="0"
            disabled
          />
        </div>
        <div class="player-times">
          <span id="trackCurrentTime">0:00</span>
          <span id="trackDuration">0:00</span>
        </div>
      </div>
 
      <a id="trackLink" class="track-card__link" href="#" target="_blank" rel="noopener noreferrer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424c-.18.295-.563.387-.857.207-2.35-1.435-5.305-1.76-8.786-.963-.335.077-.67-.133-.746-.469-.077-.336.132-.67.469-.746 3.809-.87 7.077-.496 9.713 1.115.293.18.386.563.207.856zm1.223-2.722c-.226.367-.706.482-1.072.257-2.687-1.652-6.785-2.131-9.965-1.166-.413.127-.848-.105-.975-.517-.127-.413.104-.848.517-.975 3.632-1.102 8.147-.568 11.238 1.329.366.226.48.707.257 1.072zm.105-2.835C14.692 8.95 9.375 8.775 6.297 9.71c-.493.15-1.016-.129-1.165-.623-.148-.495.13-1.016.624-1.165 3.552-1.077 9.457-.869 13.19 1.37.448.267.595.847.328 1.294-.266.448-.846.595-1.293.328z"/>
        </svg>
        Открыть в Spotify
      </a>
    </div>
  </div>
</div>

      <div id="trackNotice" class="notice error hidden"></div>
    </section>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/home.js"></script>


<nav class="bottom-nav">
    <a class="nav-link " href="/map"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49"/><path d="M7.76 16.24a6 6 0 0 1 0-8.49"/><path d="M20.07 3.93a10 10 0 0 1 0 16.14"/><path d="M3.93 20.07a10 10 0 0 1 0-16.14"/></svg><span>Radar</span></a>
    <a class="nav-link active" href="/home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></a>
    <a class="nav-link " href="/chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Chat</span></a>
    <a class="nav-link " href="/profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>Profile</span></a>
</nav>
</body>
</html>
