<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>+aura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #ff2b2b;
      --red-dim: rgba(255,43,43,0.15);
      --red-glow: rgba(255,43,43,0.5);
      --bg: #060608;
      --border: rgba(255,255,255,0.08);
      --text: #fff;
      --muted: rgba(255,255,255,0.45);
      --surface: rgba(10,10,16,0.85);
    }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Full-screen map ── */
    #map {
      position: fixed; inset: 0;
      z-index: 0;
      filter: saturate(0.55) contrast(1.1) brightness(0.75);
    }
    .leaflet-control-zoom { display: none !important; }
    .leaflet-control-attribution { display: none !important; }

    /* ── Top pill: NOW PLAYING ── */
    .now-pill-wrap {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 12px);
      left: 16px; right: 16px;
      z-index: 50;
      display: flex; justify-content: center;
      pointer-events: none;
      animation: slideDown 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .now-pill {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px 10px 12px;
      border-radius: 99px;
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      max-width: 340px; width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      cursor: pointer; pointer-events: auto;
      transition: opacity 0.15s, transform 0.1s;
    }
    .now-pill:active { transform: scale(0.97); opacity: 0.9; }
    .now-pill.has-track { border-color: rgba(255,43,43,0.25); }

    .np-cover {
      width: 36px; height: 36px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0;
      background: rgba(255,255,255,0.08);
    }
    .np-cover-ph {
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .np-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
      flex-shrink: 0;
      animation: pulse-dot 1.8s ease-in-out infinite;
    }
    .np-dot.idle { background: rgba(255,255,255,0.2); box-shadow: none; animation: none; }

    .np-info { min-width: 0; flex: 1; }
    .np-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
    .np-title {
      font-size: 13px; font-weight: 800; letter-spacing: -0.1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 180px;
    }

    .np-connect {
      font-size: 11px; font-weight: 700; color: var(--red);
      white-space: nowrap; text-decoration: none;
      padding: 5px 10px; border-radius: 99px;
      background: var(--red-dim); border: 1px solid rgba(255,43,43,0.2);
    }

    /* ── Logo top-left ── */
    .map-logo {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 14px);
      left: 16px;
      z-index: 50;
      font-size: 18px; font-weight: 900; letter-spacing: -0.5px;
      color: #fff;
      text-shadow: 0 0 12px rgba(255,255,255,0.6), 0 0 28px rgba(255,43,43,0.25);
      animation: fadeIn 0.4s ease both;
    }

    /* ── People count bottom-left ── */
    .people-chip {
      position: fixed;
      bottom: calc(72px + env(safe-area-inset-bottom) + 16px);
      left: 16px;
      z-index: 50;
      display: flex; align-items: center; gap: 6px;
      padding: 7px 13px;
      border-radius: 99px;
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      font-size: 12px; font-weight: 700;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      animation: fadeIn 0.4s 0.2s ease both;
    }
    .people-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--red); box-shadow: 0 0 6px var(--red);
      animation: pulse-dot 1.5s ease-in-out infinite;
    }

    /* ── Locate me button ── */
    .locate-btn {
      position: fixed;
      bottom: calc(72px + env(safe-area-inset-bottom) + 16px);
      right: 16px;
      z-index: 50;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      transition: transform 0.15s;
      animation: fadeIn 0.4s 0.25s ease both;
    }
    .locate-btn:active { transform: scale(0.9); }
    .locate-btn svg { opacity: 0.8; }

    /* ── Markers ── */
    .ava-marker {
      border-radius: 50%; overflow: visible;
      cursor: pointer;
      border: 2.5px solid #fff;
      box-shadow: 0 0 0 0 rgba(255,43,43,0);
      position: relative;
    }
    .ava-marker.same-track {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(255,43,43,0.3), 0 0 20px rgba(255,43,43,0.6);
    }
    .ava-marker.same-artist {
      border-color: #fff;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.2), 0 0 12px rgba(255,255,255,0.4);
    }
    .ava-marker.same-vibe {
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .ava-marker img { width:100%;height:100%;border-radius:50%;object-fit:cover; }
    .ava-init {
      width:100%;height:100%;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-weight:800;color:#fff;background:#1a1a22;
    }
    .ava-pulse {
      position:absolute; inset:-5px; border-radius:50%;
      pointer-events:none;
    }
    .same-track .ava-pulse { animation: markerPulse 2s ease-out infinite; background: rgba(255,43,43,0.25); }
    .same-artist .ava-pulse { animation: markerPulse 2.5s ease-out infinite; background: rgba(255,255,255,0.15); }
    .same-vibe .ava-pulse { display: none; }

    /* You marker */
    .you-marker {
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.2), 0 0 30px rgba(255,255,255,0.7), 0 0 50px rgba(255,43,43,0.3);
      overflow: hidden;
      position: relative;
    }
    .you-ring {
      position: absolute; inset: -8px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      animation: youRing 3s ease-in-out infinite;
    }

    /* ── Track bubble above marker ── */
    .track-bubble {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%; transform: translateX(-50%);
      background: rgba(10,10,16,0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 6px 10px;
      white-space: nowrap;
      font-size: 11px; font-weight: 700;
      color: #fff;
      backdrop-filter: blur(16px);
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      max-width: 160px;
      overflow: hidden; text-overflow: ellipsis;
    }
    .track-bubble::after {
      content: '';
      position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: rgba(10,10,16,0.92);
    }

    /* ── Sheet ── */
    .sheet-backdrop {
      position: fixed; inset: 0; z-index: 200;
      display: none; align-items: flex-end;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
    }
    .sheet-backdrop.open { display: flex; }

    .sheet {
      width: 100%;
      background: rgba(10,10,14,0.98);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 28px 28px 0 0;
      padding: 12px 20px calc(20px + env(safe-area-inset-bottom));
      box-shadow: 0 -20px 60px rgba(0,0,0,0.5);
      animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .sheet-handle {
      width: 36px; height: 4px; border-radius: 99px;
      background: rgba(255,255,255,0.15);
      margin: 0 auto 20px;
    }
    .sheet-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 14px;
    }
    .sheet-ava {
      width: 54px; height: 54px; border-radius: 50%;
      background: #1a1a22; flex-shrink: 0;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.1);
    }
    .sheet-ava img { width:100%;height:100%;object-fit:cover; }
    .sheet-name { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; }
    .sheet-city { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .match-badge {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 6px; padding: 4px 10px;
      border-radius: 99px; font-size: 11px; font-weight: 700;
    }
    .match-badge.same-track { background: var(--red-dim); color: #ff6b6b; border: 1px solid rgba(255,43,43,0.3); }
    .match-badge.same-artist { background: rgba(255,255,255,0.07); color: #fff; border: 1px solid rgba(255,255,255,0.14); }
    .match-badge.same-vibe { background: rgba(130,130,130,0.1); color: #aaa; border: 1px solid rgba(130,130,130,0.2); }

    .sheet-track {
      display: flex; align-items: center; gap: 12px;
      padding: 13px; border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      margin-bottom: 14px;
    }
    .sheet-track-cover {
      width: 44px; height: 44px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0;
      background: rgba(255,255,255,0.06);
    }
    .sheet-track-name { font-size: 14px; font-weight: 700; }
    .sheet-track-artist { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .sheet-actions { display: flex; gap: 10px; }
    .sheet-btn {
      flex: 1; padding: 14px; border-radius: 14px;
      font: 700 14px/1 'Inter', sans-serif;
      border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s;
    }
    .sheet-btn:active { transform: scale(0.97); opacity: 0.8; }
    .sheet-btn.signal { background: var(--red); color: #fff; }
    .sheet-btn.sent { background: rgba(34,197,94,0.15); color: #86efac; border: 1px solid rgba(34,197,94,0.25); cursor: default; }
    .sheet-btn.secondary { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7); border: 1px solid var(--border); }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(64px + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: rgba(6,6,8,0.88);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; align-items: stretch; z-index: 100;
    }
    .nav-link {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      text-decoration: none; color: rgba(255,255,255,0.3);
      font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase; transition: color 0.2s;
      position: relative;
    }
    .nav-link:hover { color: rgba(255,255,255,0.6); }
    .nav-link.active { color: var(--red); }
    .nav-link svg { width: 22px; height: 22px; }
    .nav-link.active svg { filter: drop-shadow(0 0 5px var(--red-glow)); }

    /* ── Animations ── */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 var(--red-glow); }
      50%       { box-shadow: 0 0 0 5px transparent; }
    }
    @keyframes markerPulse {
      0%   { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    @keyframes youRing {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50%       { transform: scale(1.15); opacity: 0.15; }
    }
    @keyframes beat-radar {
      0%,100% { transform: scale(1); }
      10%      { transform: scale(1.008); }
      20%      { transform: scale(1); }
    }
    .beating { animation: beat-radar 0.5s ease-in-out infinite; }
  </style>
</head>
<body>

  <!-- Full-screen map -->
  <div id="map"></div>

  <!-- Logo -->
  <div class="map-logo">+aura</div>

  <!-- NOW PLAYING pill -->
  <div class="now-pill-wrap">
  <div class="now-pill" id="nowPill">
    <div class="np-cover-ph" id="npCoverPh">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    </div>
    <img class="np-cover" id="npCover" src="" alt="" style="display:none;" />
    <div class="np-dot idle" id="npDot"></div>
    <div class="np-info">
      <div class="np-label">сейчас играет</div>
      <div class="np-title" id="npTitle">Что слушаешь?</div>
    </div>
    <div id="npEditBtn" style="flex-shrink:0;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </div>
  </div>
  </div><!-- /now-pill-wrap -->

  <!-- Manual track sheet -->
  <div id="manualSheetBackdrop" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);align-items:flex-end;">
    <div id="manualSheet" style="width:100%;background:rgba(10,10,14,0.99);border:1px solid rgba(255,255,255,0.08);border-bottom:none;border-radius:28px 28px 0 0;padding:12px 20px calc(28px + env(safe-area-inset-bottom));box-shadow:0 -20px 60px rgba(0,0,0,0.6);animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both;">
      <div style="width:36px;height:4px;border-radius:99px;background:rgba(255,255,255,0.12);margin:0 auto 22px;"></div>

      <div style="font-size:18px;font-weight:800;letter-spacing:-0.3px;margin-bottom:4px;">Что слушаешь?</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:20px;">Появишься на радаре у других</div>

      <!-- Поиск трека -->
      <div style="position:relative;margin-bottom:10px;">
        <input id="manualTrackInput" type="text" placeholder="Название трека..." autocomplete="off" autocorrect="off"
          style="width:100%;padding:14px 16px 14px 44px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#fff;font:700 15px/1 Inter,sans-serif;outline:none;-webkit-appearance:none;" />
        <svg style="position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
      <div style="position:relative;margin-bottom:16px;">
        <input id="manualArtistInput" type="text" placeholder="Исполнитель..." autocomplete="off" autocorrect="off"
          style="width:100%;padding:14px 16px 14px 44px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#fff;font:700 15px/1 Inter,sans-serif;outline:none;-webkit-appearance:none;" />
        <svg style="position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>

      <!-- Быстрые варианты (популярные у радара) -->
      <div id="manualSuggestions" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;"></div>

      <div style="display:flex;gap:10px;">
        <button id="manualPublishBtn" style="flex:1;padding:16px;border-radius:16px;background:#fff;color:#111;border:none;font:800 15px/1 Inter,sans-serif;cursor:pointer;transition:opacity 0.15s;">
          Опубликовать 📡
        </button>
        <button onclick="closeManualSheet()" style="padding:16px 18px;border-radius:16px;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.08);font:700 14px/1 Inter,sans-serif;cursor:pointer;">
          Отмена
        </button>
      </div>
    </div>
  </div>

  <!-- People count -->
  <div class="people-chip" id="peopleChip" style="display:none;">
    <div class="people-dot"></div>
    <span id="peopleCount">0 рядом</span>
  </div>

  <!-- Locate me -->
  <button class="locate-btn" id="locateBtn" aria-label="Моя позиция">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" style="display:none"/>
    </svg>
  </button>

  <!-- Легенда -->
  <div style="position:fixed;bottom:calc(72px + env(safe-area-inset-bottom) + 68px);right:16px;z-index:50;display:flex;flex-direction:column;gap:5px;animation:fadeIn 0.4s 0.3s ease both;">
    <div style="display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:8px;background:rgba(10,10,16,0.75);backdrop-filter:blur(12px);font-size:10px;font-weight:700;color:rgba(255,255,255,0.55);">
      <div style="width:8px;height:8px;border-radius:50%;background:#ff2b2b;box-shadow:0 0 6px #ff2b2b;flex-shrink:0;"></div> тот же трек
    </div>
    <div style="display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:8px;background:rgba(10,10,16,0.75);backdrop-filter:blur(12px);font-size:10px;font-weight:700;color:rgba(255,255,255,0.55);">
      <div style="width:8px;height:8px;border-radius:50%;background:#fff;box-shadow:0 0 6px rgba(255,255,255,0.6);flex-shrink:0;"></div> тот же артист
    </div>
    <div style="display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:8px;background:rgba(10,10,16,0.75);backdrop-filter:blur(12px);font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);">
      <div style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.25);flex-shrink:0;"></div> рядом слушает
    </div>
  </div>

  <!-- Sheet -->
  <div class="sheet-backdrop" id="sheetBackdrop">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header" id="sheetHeaderLink" style="cursor:pointer;" onclick="openUserProfile()">
        <div class="sheet-ava" id="sheetAva"></div>
        <div style="flex:1;min-width:0;">
          <div class="sheet-name" id="sheetName">—</div>
          <div class="sheet-city" id="sheetCity"></div>
          <div class="match-badge" id="sheetBadge"></div>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>

      <!-- Mini photo collage в шторке -->
      <div id="sheetPhotos" style="display:none;margin-bottom:12px;"></div>

      <div class="sheet-track" id="sheetTrackBlock">
        <img class="sheet-track-cover" id="sheetCover" src="" alt="" />
        <div>
          <div class="sheet-track-name" id="sheetTrackName">—</div>
          <div class="sheet-track-artist" id="sheetTrackArtist">—</div>
        </div>
      </div>
      <div class="sheet-actions">
        <button class="sheet-btn signal" id="sheetSignalBtn">📡 Отправить сигнал</button>
        <button class="sheet-btn secondary" id="sheetProfileBtn">👤 Профиль</button>
