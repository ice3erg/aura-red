<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>+aura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #ff2b2b;
      --red-dim: rgba(255,43,43,0.15);
      --red-glow: rgba(255,43,43,0.5);
      --bg: #060608;
      --border: rgba(255,255,255,0.08);
      --text: #fff;
      --muted: rgba(255,255,255,0.45);
      --surface: rgba(10,10,16,0.85);
    }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Full-screen map ── */
    #map {
      position: fixed; inset: 0;
      z-index: 0;
      filter: saturate(0.55) contrast(1.1) brightness(0.75);
    }
    .leaflet-control-zoom { display: none !important; }
    .leaflet-control-attribution { display: none !important; }

    /* ── Top pill: NOW PLAYING ── */
    .now-pill-wrap {
      position: fixed;
      top: 0;
      padding-top: calc(env(safe-area-inset-top, 0px) + 12px);
      left: 0; right: 0;
      z-index: 50;
      display: flex; justify-content: center;
      padding-left: 16px; padding-right: 16px;
      pointer-events: none;
      animation: slideDown 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .now-pill {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px 10px 12px;
      border-radius: 99px;
      background: rgba(10,10,16,0.88);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      max-width: min(340px, calc(100vw - 32px));
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      cursor: pointer; pointer-events: auto;
      transition: opacity 0.15s, transform 0.1s;
      overflow: hidden;
    }
    .now-pill:active { transform: scale(0.97); opacity: 0.9; }
    .now-pill.has-track { border-color: rgba(255,43,43,0.25); }

    .np-cover {
      width: 36px; height: 36px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0;
      background: rgba(255,255,255,0.08);
    }
    .np-cover-ph {
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .np-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
      flex-shrink: 0;
      animation: pulse-dot 1.8s ease-in-out infinite;
    }
    .np-dot.idle { background: rgba(255,255,255,0.2); box-shadow: none; animation: none; }

    .np-info { min-width: 0; flex: 1; }
    .np-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
    .np-title {
      font-size: 13px; font-weight: 800; letter-spacing: -0.1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 180px;
    }

    .np-connect {
      font-size: 11px; font-weight: 700; color: var(--red);
      white-space: nowrap; text-decoration: none;
      padding: 5px 10px; border-radius: 99px;
      background: var(--red-dim); border: 1px solid rgba(255,43,43,0.2);
    }

    /* ── Logo top-left ── */
    .map-logo {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 14px);
      left: 16px;
      z-index: 50;
      font-size: 18px; font-weight: 900; letter-spacing: -0.5px;
      color: #fff;
      text-shadow: 0 0 12px rgba(255,255,255,0.6), 0 0 28px rgba(255,43,43,0.25);
      animation: fadeIn 0.4s ease both;
    }

    /* ── People count bottom-left ── */
    .people-chip {
      position: fixed;
      bottom: calc(72px + env(safe-area-inset-bottom) + 16px);
      left: 16px;
      z-index: 50;
      display: flex; align-items: center; gap: 6px;
      padding: 7px 13px;
      border-radius: 99px;
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      font-size: 12px; font-weight: 700;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      animation: fadeIn 0.4s 0.2s ease both;
    }
    .people-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--red); box-shadow: 0 0 6px var(--red);
      animation: pulse-dot 1.5s ease-in-out infinite;
    }

    /* ── Locate me button ── */
    .locate-btn {
      position: fixed;
      bottom: calc(72px + env(safe-area-inset-bottom) + 16px);
      right: 16px;
      z-index: 50;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      transition: transform 0.15s;
      animation: fadeIn 0.4s 0.25s ease both;
    }
    .locate-btn:active { transform: scale(0.9); }
    .locate-btn svg { opacity: 0.8; }

    /* ── Markers ── */
    .ava-marker {
      border-radius: 50%; overflow: visible;
      cursor: pointer;
      border: 2.5px solid #fff;
      box-shadow: 0 0 0 0 rgba(255,43,43,0);
      position: relative;
    }
    .ava-marker.same-track {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(255,43,43,0.3), 0 0 20px rgba(255,43,43,0.6);
    }
    .ava-marker.same-artist {
      border-color: #fff;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.2), 0 0 12px rgba(255,255,255,0.4);
    }
    .ava-marker.same-vibe {
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .ava-marker img { width:100%;height:100%;border-radius:50%;object-fit:cover; }
    .ava-init {
      width:100%;height:100%;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-weight:800;color:#fff;background:#1a1a22;
    }
    .ava-pulse {
      position:absolute; inset:-5px; border-radius:50%;
      pointer-events:none;
    }
    .same-track .ava-pulse { animation: markerPulse 2s ease-out infinite; background: rgba(255,43,43,0.25); }
    .same-artist .ava-pulse { animation: markerPulse 2.5s ease-out infinite; background: rgba(255,255,255,0.15); }
    .same-vibe .ava-pulse { display: none; }

    /* You marker */
    .you-marker {
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.2), 0 0 30px rgba(255,255,255,0.7), 0 0 50px rgba(255,43,43,0.3);
      overflow: hidden;
      position: relative;
    }
    .you-ring {
      position: absolute; inset: -8px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      animation: youRing 3s ease-in-out infinite;
    }

    /* ── Track bubble above marker ── */
    .track-bubble {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%; transform: translateX(-50%);
      background: rgba(10,10,16,0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 6px 10px;
      white-space: nowrap;
      font-size: 11px; font-weight: 700;
      color: #fff;
      backdrop-filter: blur(16px);
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      max-width: 160px;
      overflow: hidden; text-overflow: ellipsis;
    }
    .track-bubble::after {
      content: '';
      position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: rgba(10,10,16,0.92);
    }

    /* ── Sheet ── */
    .sheet-backdrop {
      position: fixed; inset: 0; z-index: 200;
      display: none; align-items: flex-end;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
    }
    .sheet-backdrop.open { display: flex; }

    .sheet {
      width: 100%;
      background: rgba(10,10,14,0.98);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 28px 28px 0 0;
      padding: 12px 20px calc(20px + env(safe-area-inset-bottom));
      box-shadow: 0 -20px 60px rgba(0,0,0,0.5);
      animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .sheet-handle {
      width: 36px; height: 4px; border-radius: 99px;
      background: rgba(255,255,255,0.15);
      margin: 0 auto 20px;
    }
    .sheet-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 14px;
    }
    .sheet-ava {
      width: 54px; height: 54px; border-radius: 50%;
      background: #1a1a22; flex-shrink: 0;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.1);
    }
    .sheet-ava img { width:100%;height:100%;object-fit:cover; }
    .sheet-name { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; }
    .sheet-city { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .match-badge {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 6px; padding: 4px 10px;
      border-radius: 99px; font-size: 11px; font-weight: 700;
    }
    .match-badge.same-track { background: var(--red-dim); color: #ff6b6b; border: 1px solid rgba(255,43,43,0.3); }
    .match-badge.same-artist { background: rgba(255,255,255,0.07); color: #fff; border: 1px solid rgba(255,255,255,0.14); }
    .match-badge.same-vibe { background: rgba(130,130,130,0.1); color: #aaa; border: 1px solid rgba(130,130,130,0.2); }

    .sheet-track {
      display: flex; align-items: center; gap: 12px;
      padding: 13px; border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      margin-bottom: 14px;
    }
    .sheet-track-cover {
      width: 44px; height: 44px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0;
      background: rgba(255,255,255,0.06);
    }
    .sheet-track-name { font-size: 14px; font-weight: 700; }
    .sheet-track-artist { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .sheet-actions { display: flex; gap: 10px; }
    .sheet-btn {
      flex: 1; padding: 14px; border-radius: 14px;
      font: 700 14px/1 'Inter', sans-serif;
      border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s;
    }
    .sheet-btn:active { transform: scale(0.97); opacity: 0.8; }
    .sheet-btn.signal { background: var(--red); color: #fff; }
    .sheet-btn.sent { background: rgba(34,197,94,0.15); color: #86efac; border: 1px solid rgba(34,197,94,0.25); cursor: default; }
    .sheet-btn.secondary { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7); border: 1px solid var(--border); }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(64px + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: rgba(6,6,8,0.88);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; align-items: stretch; z-index: 100;
    }
    .nav-link {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      text-decoration: none; color: rgba(255,255,255,0.3);
      font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase; transition: color 0.2s;
      position: relative;
    }
    .nav-link:hover { color: rgba(255,255,255,0.6); }
    .nav-link.active { color: var(--red); }
    .nav-link svg { width: 22px; height: 22px; }
    .nav-link.active svg { filter: drop-shadow(0 0 5px var(--red-glow)); }

    /* ── Animations ── */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Аура кольца — уровни */
    .ar{position:absolute;inset:-4px;border-radius:50%;pointer-events:none;z-index:0}
    .ar-0{border:1.5px solid rgba(255,255,255,0.12)}
    .ar-1{border:1.5px dashed rgba(255,255,255,0.35);animation:dashSpin 8s linear infinite}
    .ar-2{border:2px solid rgba(255,43,43,0.55);animation:ringGlow2 3s ease-in-out infinite}
    .ar-3{border:2px solid rgba(255,43,43,0.8);animation:ringGlow2 2s ease-in-out infinite}
    .ar-4{border:2.5px solid rgba(255,43,43,0.95);box-shadow:0 0 12px rgba(255,43,43,0.4);animation:ringP 1.5s ease-in-out infinite}
    .ar-5{border:3px solid rgba(255,215,80,0.95);box-shadow:0 0 16px rgba(255,215,80,0.4);animation:goldS 2s ease-in-out infinite}
    @keyframes dashSpin{to{transform:rotate(360deg)}}
    @keyframes ringGlow2{0%,100%{opacity:0.55}50%{opacity:1;box-shadow:0 0 8px rgba(255,43,43,0.3)}}
    @keyframes ringP{0%,100%{transform:scale(1)}50%{transform:scale(1.07);box-shadow:0 0 18px rgba(255,43,43,0.6)}}
    @keyframes goldS{0%,100%{box-shadow:0 0 14px rgba(255,215,80,0.35)}50%{box-shadow:0 0 22px rgba(255,215,80,0.6);transform:scale(1.04)}}

    @keyframes mapRipple {
      0%   { width:0; height:0; opacity:1; }
      100% { width:120px; height:120px; opacity:0; }
    }
    @keyframes youPulse {
      0%,100% { transform: scale(1);    opacity: 0.9; }
      50%      { transform: scale(1.08); opacity: 1;   }
    }
    @keyframes goldSpin {
      from { filter: hue-rotate(0deg)   brightness(1);   }
      to   { filter: hue-rotate(40deg)  brightness(1.2); }
    }
    @keyframes ringBreath {
      0%,100% { opacity: 0.5; }
      50%     { opacity: 1;   }
    }
    @keyframes dashSpin {
      from { transform: rotate(0deg);   }
      to   { transform: rotate(360deg); }
    }
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 var(--red-glow); }
      50%       { box-shadow: 0 0 0 5px transparent; }
    }
    @keyframes markerPulse {
      0%   { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    @keyframes youRing {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50%       { transform: scale(1.15); opacity: 0.15; }
    }
    @keyframes beat-radar {
      0%,100% { transform: scale(1); }
      10%      { transform: scale(1.008); }
      20%      { transform: scale(1); }
    }
    .beating { animation: beat-radar 0.5s ease-in-out infinite; }
  </style>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#060608">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="+aura">
  <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>

  <!-- Full-screen map -->
  <div id="map"></div>

  <!-- Город (левый верхний) -->
  <div id="cityChip" style="display:none;position:fixed;top:calc(env(safe-area-inset-top)+14px);left:16px;z-index:50;display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:99px;background:rgba(6,6,8,0.75);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(16px);">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="rgba(255,43,43,0.8)" stroke="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    <span id="cityName" style="font-size:12px;font-weight:700;color:rgba(255,255,255,0.75);">...</span>
  </div>

  <!-- Logo -->

  <!-- NOW PLAYING pill -->
  <div class="now-pill-wrap">
  <div class="now-pill" id="nowPill">
    <div class="np-cover-ph" id="npCoverPh">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    </div>
    <img class="np-cover" id="npCover" src="" alt="" style="display:none;" />
    <div class="np-dot idle" id="npDot"></div>
    <div class="np-info">
      <div class="np-label">сейчас играет</div>
      <div class="np-title" id="npTitle">Что слушаешь?</div>
    </div>
    <a id="npConnect" href="/profile" style="display:none;font-size:11px;font-weight:700;color:rgba(255,43,43,0.8);white-space:nowrap;text-decoration:none;flex-shrink:0;">Подключить</a>
    <div id="npEditBtn" style="flex-shrink:0;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </div>
  </div>
  </div><!-- /now-pill-wrap -->

  <!-- Manual track sheet -->
  <div id="manualSheetBackdrop" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);align-items:flex-end;">
    <div id="manualSheet" style="width:100%;background:rgba(10,10,14,0.99);border:1px solid rgba(255,255,255,0.08);border-bottom:none;border-radius:28px 28px 0 0;padding:12px 20px calc(28px + env(safe-area-inset-bottom));box-shadow:0 -20px 60px rgba(0,0,0,0.6);animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both;">
      <div style="width:36px;height:4px;border-radius:99px;background:rgba(255,255,255,0.12);margin:0 auto 20px;"></div>

      <div style="font-size:18px;font-weight:800;letter-spacing:-0.3px;margin-bottom:4px;">Что слушаешь?</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:16px;">Появишься на радаре у других</div>

      <!-- MediaSession кнопка — если музыка играет в браузере -->
      <div id="mediaSessionBtn" style="display:none;margin-bottom:12px;">
        <button onclick="detectFromMediaSession()" style="width:100%;padding:13px 16px;border-radius:14px;background:rgba(255,43,43,0.12);border:1px solid rgba(255,43,43,0.25);color:#ff6b6b;font:700 13px/1 Inter,sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16"/></svg>
          Определить из плеера
        </button>
      </div>

      <!-- Умный поиск -->
      <div style="position:relative;margin-bottom:8px;">
        <input id="smartSearchInput" type="text" placeholder="Поиск трека или исполнителя..." autocomplete="off" autocorrect="off" autocapitalize="off"
          style="width:100%;padding:14px 16px 14px 46px;border-radius:16px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);color:#fff;font:700 15px/1 Inter,sans-serif;outline:none;-webkit-appearance:none;" />
        <svg style="position:absolute;left:15px;top:50%;transform:translateY(-50%);pointer-events:none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <div id="searchSpinner" style="display:none;position:absolute;right:15px;top:50%;transform:translateY(-50%);width:16px;height:16px;border:2px solid rgba(255,255,255,0.1);border-top-color:rgba(255,255,255,0.5);border-radius:50%;animation:spin 0.7s linear infinite;"></div>
      </div>

      <!-- Результаты поиска -->
      <div id="searchResults" style="max-height:260px;overflow-y:auto;margin-bottom:12px;border-radius:14px;overflow:hidden;"></div>

      <!-- Выбранный трек -->
      <div id="selectedTrack" style="display:none;margin-bottom:12px;padding:12px 14px;border-radius:14px;background:rgba(255,43,43,0.08);border:1px solid rgba(255,43,43,0.2);display:none;align-items:center;gap:12px;">
        <img id="selectedCover" src="" style="width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0;" />
        <div style="flex:1;min-width:0;">
          <div id="selectedName" style="font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
          <div id="selectedArtist" style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px;"></div>
        </div>
        <button onclick="clearSelected()" style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.5);font-size:14px;cursor:pointer;flex-shrink:0;">✕</button>
      </div>

      <div style="display:flex;gap:10px;">
        <button id="manualPublishBtn" style="flex:1;padding:16px;border-radius:16px;background:#fff;color:#111;border:none;font:800 15px/1 Inter,sans-serif;cursor:pointer;opacity:0.4;transition:opacity 0.2s;" disabled>
          Опубликовать 📡
        </button>
        <button onclick="closeManualSheet()" style="padding:16px 18px;border-radius:16px;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.08);font:700 14px/1 Inter,sans-serif;cursor:pointer;">
          Отмена
        </button>
      </div>
    </div>
  </div>

  <!-- People count -->
  <div class="people-chip" id="peopleChip" style="display:none;">
    <div class="people-dot"></div>
    <span id="peopleCount">0 рядом</span>
  </div>

  <!-- Locate me -->
  <button class="locate-btn" id="locateBtn" aria-label="Моя позиция">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" style="display:none"/>
    </svg>
  </button>

  <!-- Легенда -->
  <div style="position:fixed;bottom:calc(72px + env(safe-area-inset-bottom) + 68px);right:16px;z-index:50;display:flex;flex-direction:column;gap:5px;animation:fadeIn 0.4s 0.3s ease both;">
    <div style="display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:8px;background:rgba(10,10,16,0.75);backdrop-filter:blur(12px);font-size:10px;font-weight:700;color:rgba(255,255,255,0.55);">
      <div style="width:8px;height:8px;border-radius:50%;background:#ff2b2b;box-shadow:0 0 6px #ff2b2b;flex-shrink:0;"></div> тот же трек
    </div>
    <div style="display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:8px;background:rgba(10,10,16,0.75);backdrop-filter:blur(12px);font-size:10px;font-weight:700;color:rgba(255,255,255,0.55);">
      <div style="width:8px;height:8px;border-radius:50%;background:#fff;box-shadow:0 0 6px rgba(255,255,255,0.6);flex-shrink:0;"></div> тот же артист
    </div>
    <div style="display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:8px;background:rgba(10,10,16,0.75);backdrop-filter:blur(12px);font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);">
      <div style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.25);flex-shrink:0;"></div> рядом слушает
    </div>
  </div>

  <!-- Sheet -->
  <div class="sheet-backdrop" id="sheetBackdrop">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header" id="sheetHeaderLink" style="cursor:pointer;" onclick="openUserProfile()">
        <div class="sheet-ava" id="sheetAva"></div>
        <div style="flex:1;min-width:0;">
          <div class="sheet-name" id="sheetName">—</div>
          <div class="sheet-city" id="sheetCity"></div>
          <div class="match-badge" id="sheetBadge"></div>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>

      <!-- Mini photo collage в шторке -->
      <div id="sheetPhotos" style="display:none;margin-bottom:12px;"></div>

      <div class="sheet-track" id="sheetTrackBlock">
        <img class="sheet-track-cover" id="sheetCover" src="" alt="" />
        <div>
          <div class="sheet-track-name" id="sheetTrackName">—</div>
          <div class="sheet-track-artist" id="sheetTrackArtist">—</div>
        </div>
      </div>
      <!-- Реакции на трек -->
      <div id="sheetReactions" style="display:none;margin-bottom:14px;">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.3);margin-bottom:8px;">Реакция на трек</div>
        <div style="display:flex;gap:8px;">
          <button onclick="sendReaction('🔥')" style="flex:1;padding:10px 0;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);font-size:22px;cursor:pointer;transition:all 0.15s;">🔥</button>
          <button onclick="sendReaction('❤️')" style="flex:1;padding:10px 0;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);font-size:22px;cursor:pointer;transition:all 0.15s;">❤️</button>
          <button onclick="sendReaction('😮')" style="flex:1;padding:10px 0;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);font-size:22px;cursor:pointer;transition:all 0.15s;">😮</button>
          <button onclick="sendReaction('👎')" style="flex:1;padding:10px 0;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);font-size:22px;cursor:pointer;transition:all 0.15s;">👎</button>
          <button onclick="sendReaction('🎵')" style="flex:1;padding:10px 0;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);font-size:22px;cursor:pointer;transition:all 0.15s;">🎵</button>
        </div>
      </div>
      <div class="sheet-actions">
        <button class="sheet-btn signal" id="sheetSignalBtn">📡 Отправить сигнал</button>
        <button class="sheet-btn secondary" id="sheetProfileBtn" style="display:none;">👤 Профиль</button>
      </div>
      <div style="margin-top:8px;">
        <button class="sheet-btn secondary" id="sheetClose" style="width:100%;background:transparent;border:none;color:rgba(255,255,255,0.3);font-size:13px;padding:10px;">Закрыть</button>
      </div>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="nav-link active" href="/home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><path d="M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M17.66 6.34l-2.12 2.12M6.34 17.66l-2.12 2.12"/></svg>
      <span>Радар</span>
    </a>
    <a class="nav-link" href="/chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Chat</span>
    </a>
    <a class="nav-link" href="/profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Profile</span>
    </a>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="/js/utils.js"></script>
  <script src="/js/home.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
