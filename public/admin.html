<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>+aura admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#060608;color:#fff;font-family:Inter,sans-serif;min-height:100vh;padding:24px}
    .logo{font-size:24px;font-weight:900;letter-spacing:-1px;margin-bottom:24px;color:#ff2b2b}
    .auth{max-width:360px;margin:80px auto}
    .auth input{width:100%;padding:14px 16px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;font:700 15px Inter;outline:none;margin-bottom:10px}
    .auth button{width:100%;padding:14px;border-radius:12px;background:#ff2b2b;color:#fff;border:none;font:800 15px Inter;cursor:pointer}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
    .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px}
    .card-val{font-size:36px;font-weight:900;letter-spacing:-1px;margin-bottom:4px}
    .card-label{font-size:12px;color:rgba(255,255,255,0.4);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
    .card.red .card-val{color:#ff2b2b}
    .card.green .card-val{color:#22c55e}
    .card.yellow .card-val{color:#eab308}
    .section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,0.3);margin-bottom:12px}
    table{width:100%;border-collapse:collapse}
    td,th{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.05)}
    th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,0.3)}
    tr:last-child td{border-bottom:none}
    .tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;background:rgba(255,43,43,0.12);color:#ff6b6b}
    .refresh{float:right;background:none;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.4);font:600 12px Inter;padding:6px 12px;border-radius:8px;cursor:pointer;margin-bottom:20px}
    .refresh:hover{color:#fff}
  </style>
</head>
<body>
  <div class="logo">+aura admin</div>

  <div id="authBlock" class="auth">
    <input id="keyInput" type="password" placeholder="Admin key" />
    <button onclick="login()">Войти</button>
  </div>

  <div id="dashboard" style="display:none">
    <button class="refresh" onclick="load()">↻ Обновить</button>

    <div class="section-title">Пользователи</div>
    <div class="grid" id="statsGrid"></div>

    <div class="section-title">Последние регистрации</div>
    <table>
      <thead><tr><th>Имя</th><th>Email</th><th>Очки</th><th>Зарегался</th></tr></thead>
      <tbody id="usersTable"></tbody>
    </table>
  </div>

  <script>
    let _key = localStorage.getItem('aura_admin_key') || '';
    if (_key) { document.getElementById('authBlock').style.display='none'; document.getElementById('dashboard').style.display=''; load(); }

    function login() {
      _key = document.getElementById('keyInput').value.trim();
      localStorage.setItem('aura_admin_key', _key);
      document.getElementById('authBlock').style.display='none';
      document.getElementById('dashboard').style.display='';
      load();
    }

    function timeAgo(ts) {
      const d = new Date(ts), now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return diff + 'с назад';
      if (diff < 3600) return Math.floor(diff/60) + 'м назад';
      if (diff < 86400) return Math.floor(diff/3600) + 'ч назад';
      return Math.floor(diff/86400) + 'д назад';
    }

    async function load() {
      try {
        const r = await fetch(`/api/admin/stats?key=${_key}`).then(r=>r.json());
        if (!r.ok) { alert('Неверный ключ'); localStorage.removeItem('aura_admin_key'); location.reload(); return; }
        const s = r.stats;
        document.getElementById('statsGrid').innerHTML = `
          <div class="card red"><div class="card-val">${s.totalUsers}</div><div class="card-label">Всего юзеров</div></div>
          <div class="card green"><div class="card-val">${s.newToday}</div><div class="card-label">Сегодня</div></div>
          <div class="card yellow"><div class="card-val">${s.newThisWeek}</div><div class="card-label">За неделю</div></div>
          <div class="card"><div class="card-val">${s.pushEnabled}</div><div class="card-label">Push включён</div></div>
          <div class="card"><div class="card-val">${s.signalsWeek}</div><div class="card-label">Сигналов/нед</div></div>
          <div class="card"><div class="card-val">${s.messagesWeek}</div><div class="card-label">Сообщений/нед</div></div>
          <div class="card"><div class="card-val">${s.totalChats}</div><div class="card-label">Чатов всего</div></div>
        `;
        document.getElementById('usersTable').innerHTML = r.recentUsers.map(u => `
          <tr>
            <td>${u.name || '<span style="opacity:.4">—</span>'} ${u.username ? '<span class="tag">@'+u.username+'</span>' : ''}</td>
            <td style="opacity:.5">${u.email||'—'}</td>
            <td>${u.aura_points||0} ✦</td>
            <td style="opacity:.5">${timeAgo(u.created_at)}</td>
          </tr>`).join('');
      } catch(e) { console.error(e); }
    }

    document.getElementById('keyInput')?.addEventListener('keydown', e => { if(e.key==='Enter') login(); });
  </script>
</body>
</html>
