<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify подключён — +aura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
<style id="native-feel">
  * {
    -webkit-tap-highlight-color: transparent !important;
    -webkit-touch-callout: none;
  }
  html, body {
    overscroll-behavior: none;
    -webkit-overflow-scrolling: touch;
  }
  /* Текст не выделяется (как в нативных приложениях), кроме полей ввода */
  body { -webkit-user-select: none; user-select: none; }
  input, textarea, [contenteditable] { -webkit-user-select: text; user-select: text; }
  /* Кнопки и интерактив — мгновенный отклик без 300ms задержки */
  a, button, .nav-link, [role="button"], [onclick] { touch-action: manipulation; }
</style>
</head>
<body class="red-mode auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="logo">+aura</div>
      <h1 id="successTitle">Сервис подключён</h1>
      <p id="spotifyNameText" class="auth-subtitle"></p>

      <button id="continueBtn" class="primary-btn">Перейти в приложение</button>
    </section>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/music.js"></script>
  <script>
    (function(){
      const p = new URLSearchParams(location.search);
      const title = document.getElementById('successTitle');
      const sub = document.getElementById('spotifyNameText');
      if (p.get('appleConnected') === 'true') {
        title.textContent = 'Apple Music подключён';
      } else if (p.get('spotifyConnected') === 'true') {
        title.textContent = 'Spotify подключён';
        const n = p.get('spotifyName'); if (n && sub) sub.textContent = n;
      }
      document.getElementById('continueBtn')?.addEventListener('click', () => location.href='/home');
    })();
    try { window.AuraMusic?.finishConnectPage?.(); } catch(_) {}
  </script>
</body>
</html>
