<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль — +aura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="red-mode auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="logo">+aura</div>
      <h1>Создание профиля</h1>
      <p class="auth-subtitle">Заполни базовую информацию о себе.</p>

      <form data-onboarding-form class="auth-form">
        <label class="field">
          <span>Имя</span>
          <input type="text" name="name" placeholder="Как тебя зовут" required />
        </label>

        <label class="field">
          <span>Возраст</span>
          <input type="number" name="age" placeholder="Сколько тебе лет" required />
        </label>

        <label class="field">
          <span>Город</span>
          <input type="text" name="city" placeholder="Твой город" required />
        </label>

        <label class="field">
          <span>О себе</span>
          <textarea name="bio" placeholder="Пару слов о себе"></textarea>
        </label>

        <div data-form-notice class="notice hidden"></div>

        <button type="submit" class="primary-btn">Сохранить профиль</button>
      </form>
    </section>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
