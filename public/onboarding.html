<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding — +aura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/profile.js"></script>
</head>
<body>
  <main class="center-shell">
    <section class="card auth-card stack-lg">
      <div class="logo"><span class="logo-dot"></span> +aura</div>
      <div class="stack">
        <div class="eyebrow">Profile setup</div>
        <h2>Build the identity people see first.</h2>
        <p class="lead">This is your +aura profile, not your Spotify profile.</p>
      </div>
      <div class="notice error hidden" data-form-notice></div>
      <form class="stack" data-onboarding-form>
        <div class="input-group"><label class="label">Name</label><input class="input" name="name" placeholder="Max"></div>
        <div class="input-group"><label class="label">Age</label><input class="input" name="age" placeholder="21"></div>
        <div class="input-group"><label class="label">City</label><input class="input" name="city" placeholder="Saint Petersburg"></div>
        <div class="input-group"><label class="label">Avatar URL</label><input class="input" name="avatar" placeholder="https://..."></div>
        <div class="input-group"><label class="label">Bio</label><textarea class="textarea" name="bio" placeholder="Night city, low lights, good sound."></textarea></div>
        <button class="btn btn-primary btn-full" type="submit">Continue to music connect</button>
      </form>
    </section>
  </main>
</body>
</html>
