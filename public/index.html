<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>+aura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
<style id="native-feel">
  * {
    -webkit-tap-highlight-color: transparent !important;
    -webkit-touch-callout: none;
  }
  html, body {
    overscroll-behavior: none;
    -webkit-overflow-scrolling: touch;
  }
  /* Текст не выделяется (как в нативных приложениях), кроме полей ввода */
  body { -webkit-user-select: none; user-select: none; }
  input, textarea, [contenteditable] { -webkit-user-select: text; user-select: text; }
  /* Кнопки и интерактив — мгновенный отклик без 300ms задержки */
  a, button, .nav-link, [role="button"], [onclick] { touch-action: manipulation; }
</style>
</head>
<body class="red-mode">
  <main class="landing">
    <div class="landing-card">
      <div class="logo">+aura</div>
      <h1>Найди людей на своей волне</h1>
      <p class="subtitle">
        +aura показывает, кто рядом слушает похожую музыку и помогает находить своих в реальном мире.
      </p>

      <div class="landing-actions">
        <a class="primary-btn" href="/signup">Создать аккаунт</a>
        <a class="secondary-btn" href="/login">Войти</a>
      </div>
    </div>
  </main>
</body>
</html>
