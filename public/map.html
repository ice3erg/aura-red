<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>+aura — Map</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body{height:100%;background:#050505;overflow:hidden;color:#fff;font-family:'Inter',system-ui,sans-serif}
      #map{position:fixed;inset:0;bottom:64px;filter:saturate(0.6) contrast(1.1) brightness(0.72);z-index:0}
      .leaflet-control-attribution{display:none!important}
      .leaflet-control-zoom{border:none!important}
      .leaflet-control-zoom a{background:rgba(8,8,10,.88)!important;color:#fff!important;border:1px solid rgba(255,255,255,.07)!important;backdrop-filter:blur(16px)}
      .map-topbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 16px 12px;display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,rgba(5,5,5,.97) 55%,transparent);pointer-events:none}
      .map-brand{font-size:24px;font-weight:800;letter-spacing:-.5px;flex-shrink:0;pointer-events:auto}
      .map-now{flex:1;min-width:0;display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:14px;background:rgba(8,8,10,.84);border:1px solid rgba(255,255,255,.07);backdrop-filter:blur(20px);pointer-events:auto;overflow:hidden}
      .map-now-dot{width:7px;height:7px;border-radius:50%;background:#ff2b2b;flex-shrink:0;box-shadow:0 0 8px #ff2b2b;animation:blink 1.6s ease-in-out infinite}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
      .map-now-text{min-width:0;overflow:hidden}
      .map-now-label{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,.5);line-height:1}
      .map-now-track{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
      .map-now-artist{font-size:11px;color:rgba(255,255,255,.55);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .map-stats{position:fixed;top:78px;left:16px;z-index:100;display:flex;gap:7px;flex-wrap:wrap}
      .stat-chip{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;background:rgba(8,8,10,.84);border:1px solid rgba(255,255,255,.07);backdrop-filter:blur(16px);font-size:12px;font-weight:700}
      .stat-chip .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
      .stat-chip .dot.red{background:#ff2b2b;box-shadow:0 0 6px #ff2b2b}
      .stat-chip .dot.white{background:#fff;box-shadow:0 0 6px rgba(255,255,255,.7)}
      .stat-chip .dot.gray{background:#888}
      .radar-marker{border-radius:50%;position:relative;cursor:pointer;transform:translate(-50%,-50%)}
      .radar-marker::after{content:'';position:absolute;inset:0;border-radius:50%;animation:mpulse 2s ease-out infinite}
      @keyframes mpulse{0%{transform:scale(1);opacity:.55}100%{transform:scale(2.8);opacity:0}}
      .radar-marker.same-track{width:18px;height:18px;background:#ff2b2b;box-shadow:0 0 20px rgba(255,43,43,.9)}
      .radar-marker.same-track::after{background:#ff2b2b}
      .radar-marker.same-artist{width:15px;height:15px;background:#fff;box-shadow:0 0 14px rgba(255,255,255,.75)}
      .radar-marker.same-artist::after{background:#fff}
      .radar-marker.same-vibe{width:12px;height:12px;background:#888;box-shadow:0 0 8px rgba(150,150,150,.4)}
      .radar-marker.same-vibe::after{background:#888}
      .radar-marker.you{width:22px;height:22px;background:#fff;box-shadow:0 0 28px rgba(255,255,255,.9),0 0 48px rgba(255,43,43,.22)}
      .radar-marker.you::after{background:#ff2b2b;opacity:.4}
      .sheet-backdrop{position:fixed;inset:0;bottom:64px;z-index:200;display:none;align-items:flex-end;justify-content:center;padding:16px;background:rgba(0,0,0,.4);backdrop-filter:blur(4px)}
      .sheet-backdrop.open{display:flex}
      .profile-sheet{width:100%;max-width:440px;border-radius:24px;background:rgba(10,10,13,.97);border:1px solid rgba(255,255,255,.07);box-shadow:0 0 60px rgba(255,43,43,.1),0 40px 80px rgba(0,0,0,.7);padding:20px;animation:slideUp .22s cubic-bezier(.34,1.56,.64,1)}
      @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
      .sheet-header{display:flex;align-items:flex-start;gap:13px}
      .sheet-ava{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#2a2a2a,#1a1a1a);border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
      .sheet-info{flex:1;min-width:0}
      .sheet-name{font-size:21px;font-weight:800;line-height:1.1}
      .sheet-city{font-size:13px;color:rgba(255,255,255,.55);margin-top:3px}
      .match-badge{display:inline-flex;align-items:center;gap:5px;margin-top:7px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
      .match-badge.same-track{background:rgba(255,43,43,.15);color:#ff6b6b;border:1px solid rgba(255,43,43,.3)}
      .match-badge.same-artist{background:rgba(255,255,255,.07);color:#fff;border:1px solid rgba(255,255,255,.14)}
      .match-badge.same-vibe{background:rgba(130,130,130,.1);color:#aaa;border:1px solid rgba(130,130,130,.2)}
      .sheet-track-block{margin-top:15px;padding:13px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:12px}
      .sheet-cover{width:42px;height:42px;border-radius:8px;background:#1a1a1a;flex-shrink:0;object-fit:cover}
      .sheet-track-name{font-size:15px;font-weight:700}
      .sheet-track-artist{font-size:13px;color:rgba(255,255,255,.55);margin-top:2px}
      .sheet-actions{margin-top:15px;display:flex;gap:10px}
      .sheet-btn{flex:1;border:none;border-radius:14px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
      .sheet-btn:active{opacity:.7}
      .sheet-btn.primary{background:#fff;color:#111}
      .sheet-btn.secondary{background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.08)}
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div class="map-topbar">
      <div class="map-brand">+aura</div>
      <div class="map-now">
        <div class="map-now-dot"></div>
        <div class="map-now-text">
          <div class="map-now-label">сейчас играет</div>
          <div class="map-now-track" id="topbarTrack">—</div>
          <div class="map-now-artist" id="topbarArtist">—</div>
        </div>
      </div>
    </div>

    <div class="map-stats">
      <div class="stat-chip"><span class="dot red"></span><span id="cntTrack">0</span>&nbsp;трек</div>
      <div class="stat-chip"><span class="dot white"></span><span id="cntArtist">0</span>&nbsp;артист</div>
      <div class="stat-chip"><span class="dot gray"></span><span id="cntVibe">0</span>&nbsp;вайб</div>
    </div>

    <div class="sheet-backdrop" id="sheetBackdrop">
      <div class="profile-sheet">
        <div class="sheet-header">
          <div class="sheet-ava">👤</div>
          <div class="sheet-info">
            <div class="sheet-name" id="sheetName">—</div>
            <div class="sheet-city" id="sheetCity">—</div>
            <div class="match-badge" id="sheetBadge">—</div>
          </div>
        </div>
        <div class="sheet-track-block">
          <img class="sheet-cover" id="sheetCover" src="" alt="" onerror="this.style.display='none'" />
          <div>
            <div class="sheet-track-name"   id="sheetTrackName">—</div>
            <div class="sheet-track-artist" id="sheetTrackArtist">—</div>
          </div>
        </div>
        <div class="sheet-actions">
          <button class="sheet-btn primary">Написать</button>
          <button class="sheet-btn secondary" id="sheetClose">Закрыть</button>
        </div>
      </div>
    </div>

    <nav class="bottom-nav">
    <a class="nav-link active" href="/map"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49"/><path d="M7.76 16.24a6 6 0 0 1 0-8.49"/><path d="M20.07 3.93a10 10 0 0 1 0 16.14"/><path d="M3.93 20.07a10 10 0 0 1 0-16.14"/></svg><span>Radar</span></a>
    <a class="nav-link " href="/home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></a>
    <a class="nav-link " href="/chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Chat</span></a>
    <a class="nav-link " href="/profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>Profile</span></a>
</nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="/js/utils.js"></script>
    <script src="/js/map.js"></script>
  </body>
</html>
