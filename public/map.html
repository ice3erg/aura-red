<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar — +aura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/map.js"></script>
</head>
<body>
  <main class="shell stack-lg">
    <section class="row-between">
      <div>
        <div class="kicker"><span class="bullet"></span> Radar mode</div>
        <h2>Live social surface</h2>
      </div>
      <a class="btn btn-secondary btn-small" href="/home">Back</a>
    </section>

    <section class="live-radar">
      <div class="radar-grid"></div>
      <div class="radar-rings">
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
        <div class="sweep"></div>
      </div>
      <div class="radar-points">
        <div class="point me" style="left:calc(50% - 30px); top:calc(50% - 30px);">You</div>
        <div class="point" style="left:22%; top:22%;">M</div>
        <div class="point" style="left:67%; top:30%;">K</div>
        <div class="point" style="left:60%; top:64%;">N</div>
      </div>
      <div class="radar-overlay">
        <div class="row-between">
          <div>
            <strong>17 people active around you</strong>
            <p class="muted">2 strong music matches • 4 hotspots live</p>
          </div>
          <span class="tag active">Scanning</span>
        </div>
      </div>
    </section>

    <section class="sheet card panel stack">
      <div class="eyebrow">Explore mode</div>
      <div class="map-canvas" data-map-canvas></div>
      <div class="stack" data-map-list></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a class="nav-link active" href="/home">Radar</a>
    <a class="nav-link active" href="/map">Signals</a>
    <a class="nav-link" href="/chat">Chat</a>
    <a class="nav-link" href="/profile">Profile</a>
  </nav>
</body>
</html>
