<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar — +aura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell stack-lg">
    <section class="row-between">
      <div>
        <div class="kicker"><span class="bullet"></span> Radar mode</div>
        <h2>Live social surface</h2>
      </div>
      <a class="btn btn-secondary btn-small" href="/home">Back</a>
    </section>

    <section class="live-radar">
      <div class="radar-grid"></div>
      <div class="radar-rings">
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
        <div class="sweep"></div>
      </div>
      <div class="radar-points">
        <div class="point me" style="left:calc(50% - 30px); top:calc(50% - 30px);">You</div>
        <div class="point" style="left:22%; top:22%;">M</div>
        <div class="point" style="left:67%; top:30%;">K</div>
        <div class="point" style="left:60%; top:64%;">N</div>
      </div>
      <div class="radar-overlay">
        <div class="row-between">
          <div>
            <strong>17 people active around you</strong>
            <p class="muted">2 strong music matches • 4 hotspots live</p>
          </div>
          <span class="tag active">Scanning</span>
        </div>
      </div>
    </section>

    <section class="sheet card panel stack">
      <div class="eyebrow">Explore mode</div>
      <div class="map-canvas" data-map-canvas></div>
      <div class="stack" data-map-list></div>
    </section>
  </main>

  


<nav class="bottom-nav">
    <a class="nav-link" href="/home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49"/><path d="M7.76 16.24a6 6 0 0 1 0-8.49"/><path d="M20.07 3.93a10 10 0 0 1 0 16.14"/><path d="M3.93 20.07a10 10 0 0 1 0-16.14"/></svg><span>Radar</span></a>
    <a class="nav-link active" href="/map"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg><span>Signals</span></a>
    <a class="nav-link" href="/chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Chat</span></a>
    <a class="nav-link" href="/profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>Profile</span></a>
</nav>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/map.js"></script>
</body>
</html>
