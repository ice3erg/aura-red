<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Друзья — +aura</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#ff2b2b;--bg:#060608;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);--text:#fff;--muted:rgba(255,255,255,0.45)}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    body{padding-bottom:calc(80px + env(safe-area-inset-bottom))}
    .bg-glow{position:fixed;top:-10%;left:50%;transform:translateX(-50%);width:500px;height:300px;background:radial-gradient(ellipse,rgba(255,43,43,0.07) 0%,transparent 70%);pointer-events:none;z-index:0}
    .page{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:calc(env(safe-area-inset-top)+16px) 0 16px}

    .page-title{font-size:28px;font-weight:900;letter-spacing:-0.5px;padding:0 20px;margin-bottom:16px}

    /* Friend card */
    .friend-card{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;transition:background 0.15s;text-decoration:none;color:var(--text)}
    .friend-card:active{background:rgba(255,255,255,0.04)}
    .friend-ava{width:52px;height:52px;border-radius:50%;background:#1a1a22;flex-shrink:0;overflow:hidden;position:relative}
    .friend-ava img{width:100%;height:100%;object-fit:cover}
    .friend-ava-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:rgba(255,255,255,0.4)}
    .friend-ring{position:absolute;inset:-3px;border-radius:50%;border:2px solid #22c55e;box-shadow:0 0 8px rgba(34,197,94,0.4);pointer-events:none}
    .friend-info{flex:1;min-width:0}
    .friend-name{font-size:15px;font-weight:700}
    .friend-track{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .friend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .friend-dot.online{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,0.6)}
    .friend-dot.offline{background:rgba(255,255,255,0.15)}

    .remove-btn{padding:6px 12px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.3);font:600 12px/1 Inter,sans-serif;cursor:pointer;flex-shrink:0}
    .remove-btn:active{background:rgba(255,43,43,0.1);border-color:rgba(255,43,43,0.2);color:#ff6b6b}

    .divider{height:1px;background:var(--border);margin:0 20px}

    .empty{text-align:center;padding:60px 32px}
    .empty-icon{font-size:48px;margin-bottom:12px}
    .empty-title{font-size:18px;font-weight:800;margin-bottom:8px}
    .empty-sub{font-size:13px;color:var(--muted);line-height:1.6}
    .empty-btn{display:inline-block;margin-top:20px;padding:13px 24px;border-radius:14px;background:var(--red);color:#fff;font:800 14px/1 Inter,sans-serif;text-decoration:none}

    /* Bottom nav */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(64px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:rgba(6,6,8,0.92);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:100}
    .nav-link{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-decoration:none;color:rgba(255,255,255,0.3);font-size:10px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase}
    .nav-link.active{color:var(--red)}
    .nav-link svg{width:22px;height:22px}
    .nav-link.active svg{filter:drop-shadow(0 0 5px rgba(255,43,43,0.5))}
    .nav-badge{position:absolute;top:-2px;right:-6px;background:var(--red);color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 4px}
    .nav-icon-wrap{position:relative}
  </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="page">
  <div class="page-title">Друзья</div>
  <div id="friendsList"><div style="padding:20px;color:rgba(255,255,255,0.3);font-size:14px;">Загружаем...</div></div>
</div>

<nav class="bottom-nav">
  <a class="nav-link" href="/home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><path d="M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M17.66 6.34l-2.12 2.12M6.34 17.66l-2.12 2.12"/></svg>
    <span>Радар</span>
  </a>
  <a class="nav-link" href="/chat">
    <div class="nav-icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <span>Чат</span>
  </a>
  <a class="nav-link active" href="/friends">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <span>Друзья</span>
  </a>
  <a class="nav-link" href="/profile">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    <span>Профиль</span>
  </a>
</nav>

<script src="/js/utils.js"></script>
<script>
(async () => {
  const U = window.AuraUtils;
  const me = await U.requireAuth();
  if (!me) return;

  const list = document.getElementById('friendsList');

  function timeAgo(ts) {
    if (!ts) return '';
    const d = Date.now() - ts;
    if (d < 60000) return '🟢 онлайн';
    if (d < 3600000) return Math.floor(d/60000)+'м назад';
    if (d < 86400000) return Math.floor(d/3600000)+'ч назад';
    return Math.floor(d/86400000)+'д назад';
  }

  function ava(f) {
    if (f.avatar) return `<img src="${f.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    return `<div class="friend-ava-ph">${(f.name||'?')[0].toUpperCase()}</div>`;
  }

  async function removeFriend(id, name) {
    if (!confirm(`Удалить ${name} из друзей?`)) return;
    await fetch('/api/friends/remove', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({toId:id}) });
    load();
  }

  async function load() {
    const r = await fetch('/api/friends').then(r=>r.json()).catch(()=>({ok:false,friends:[]}));
    if (!r.ok || !r.friends.length) {
      list.innerHTML = `<div class="empty">
        <div class="empty-icon">🤝</div>
        <div class="empty-title">Пока нет друзей</div>
        <div class="empty-sub">Открой профиль кого-нибудь на радаре<br>и нажми 🤝 чтобы добавить в друзья</div>
        <a href="/home" class="empty-btn">Открыть радар</a>
      </div>`;
      return;
    }

    list.innerHTML = r.friends.map((f, i) => {
      const ct = f.currentTrack;
      const isOnline = ct?.track && ct?.updatedAt && (Date.now() - (ct.updatedAt||0)) < 30*60*1000;
      const trackText = ct?.track ? `🎵 ${ct.track} — ${ct.artist}` : 'Не слушает сейчас';
      const ago = timeAgo(ct?.updatedAt);
      return `${i>0?'<div class="divider"></div>':''}
        <a class="friend-card" href="/u/${f.username||f.id}">
          <div class="friend-ava">
            ${ava(f)}
            <div class="friend-ring"></div>
          </div>
          <div class="friend-info">
            <div class="friend-name">${f.name||'Аноним'}</div>
            <div class="friend-track">${isOnline ? trackText : (ago||'Давно не был')}</div>
          </div>
          <div class="friend-dot ${isOnline?'online':'offline'}"></div>
          <button class="remove-btn" onclick="event.preventDefault();window.removeFriend('${f.id}','${f.name||'друга'}')">✕</button>
        </a>`;
    }).join('');

    window.removeFriend = removeFriend;
  }

  load();
})();
</script>
</body>
</html>
