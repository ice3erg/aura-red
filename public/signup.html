<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация — +aura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="red-mode auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="logo">+aura</div>
      <h1>Регистрация</h1>
      <p class="auth-subtitle">Создай свой аккаунт в +aura.</p>

      <form data-signup-form class="auth-form">
        <label class="field">
          <span>Почта</span>
          <input type="email" name="email" placeholder="Введите почту" required />
        </label>

        <label class="field">
          <span>Пароль</span>
          <input type="password" name="password" placeholder="Минимум 6 символов" required />
        </label>

        <label class="field">
          <span>Повторите пароль</span>
          <input type="password" name="confirmPassword" placeholder="Повторите пароль" required />
        </label>

        <div data-form-notice class="notice hidden"></div>

        <button type="submit" class="primary-btn">Продолжить</button>
      </form>

      <p class="auth-footer">
        Уже есть аккаунт?
        <a href="/login">Войти</a>
      </p>
    </section>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
