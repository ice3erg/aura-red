<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — +aura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
</head>
<body>
  <main class="center-shell">
    <section class="card auth-card stack-lg">
      <div class="logo"><span class="logo-dot"></span> +aura</div>
      <div class="stack">
        <div class="eyebrow">Create account</div>
        <h2>Enter the city with your own signal.</h2>
        <p class="lead">Start with email and password. Profile setup comes next.</p>
      </div>
      <div class="notice error hidden" data-form-notice></div>
      <form class="stack" data-signup-form>
        <div class="input-group">
          <label class="label" for="email">Email</label>
          <input class="input" id="email" name="email" type="email" placeholder="you@example.com" required>
        </div>
        <div class="input-group">
          <label class="label" for="password">Password</label>
          <input class="input" id="password" name="password" type="password" placeholder="Minimum 6 characters" required>
        </div>
        <div class="input-group">
          <label class="label" for="confirmPassword">Confirm password</label>
          <input class="input" id="confirmPassword" name="confirmPassword" type="password" placeholder="Repeat password" required>
        </div>
        <button class="btn btn-primary btn-full" type="submit">Continue</button>
      </form>
      <div class="auth-links">
        <span>Already have an account?</span>
        <a href="/login">Log in</a>
      </div>
    </section>
  </main>
</body>
</html>
