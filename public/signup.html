<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — +aura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="red-mode auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="brand-mark">+aura</div>

      <h1>Create account</h1>
      <p class="auth-subtitle">Enter the city with your own signal.</p>

      <form data-signup-form class="auth-form">
        <label class="field">
          <span>Email</span>
          <input
            type="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </label>

        <label class="field">
          <span>Password</span>
          <input
            type="password"
            name="password"
            placeholder="Minimum 6 characters"
            autocomplete="new-password"
            required
          />
        </label>

        <label class="field">
          <span>Confirm password</span>
          <input
            type="password"
            name="confirmPassword"
            placeholder="Repeat password"
            autocomplete="new-password"
            required
          />
        </label>

        <div data-form-notice class="notice hidden"></div>

        <button type="submit" class="primary-btn">Continue</button>
      </form>

      <p class="auth-footer">
        Already have an account?
        <a href="/login">Log in</a>
      </p>
    </section>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
