<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Аура — +aura</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#ff2b2b;--bg:#060608;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);--text:#fff;--muted:rgba(255,255,255,0.45)}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    body{padding-bottom:calc(80px + env(safe-area-inset-bottom))}

    .bg-glow{position:fixed;top:-10%;left:50%;transform:translateX(-50%);width:500px;height:300px;background:radial-gradient(ellipse,rgba(255,43,43,0.07) 0%,transparent 70%);pointer-events:none;z-index:0}
    .page{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:24px 0 32px}

    /* Header */
    .page-header{padding:0 20px;margin-bottom:24px}
    .page-title{font-size:32px;font-weight:900;letter-spacing:-1px}
    .page-sub{font-size:13px;color:var(--muted);margin-top:4px}

    /* Aura big display */
    .aura-hero{margin:0 20px 20px;padding:24px 20px;border-radius:24px;background:linear-gradient(135deg,rgba(255,43,43,0.12),rgba(255,43,43,0.04));border:1px solid rgba(255,43,43,0.2);display:flex;align-items:center;gap:20px}
    .aura-orb{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;position:relative}
    .aura-orb-ring{position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--red);animation:orbPulse 2s ease-in-out infinite}
    @keyframes orbPulse{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
    .aura-pts{font-size:42px;font-weight:900;letter-spacing:-2px;line-height:1}
    .aura-rank-name{font-size:14px;color:rgba(255,255,255,0.6);margin-top:4px;font-weight:600}
    .aura-bar-wrap{flex:1}
    .aura-bar-bg{height:4px;border-radius:99px;background:rgba(255,255,255,0.08);margin-top:8px;overflow:hidden}
    .aura-bar-fill{height:100%;border-radius:99px;background:var(--red);transition:width 1s cubic-bezier(0.34,1.56,0.64,1)}
    .aura-next-lbl{font-size:11px;color:rgba(255,255,255,0.3);margin-top:5px;font-weight:600}

    /* How to earn */
    .earn-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 20px 20px}
    .earn-card{padding:14px;border-radius:16px;background:var(--surface);border:1px solid var(--border)}
    .earn-icon{font-size:20px;margin-bottom:6px}
    .earn-val{font-size:16px;font-weight:900;color:var(--red)}
    .earn-lbl{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600;line-height:1.3}

    /* Section */
    .sec{margin:0 20px 20px}
    .sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:10px}

    /* Challenges */
    .challenge-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:14px;background:var(--surface);border:1px solid var(--border);margin-bottom:8px}
    .ch-emoji{font-size:20px;flex-shrink:0}
    .ch-body{flex:1;min-width:0}
    .ch-name{font-size:13px;font-weight:700}
    .ch-desc{font-size:11px;color:var(--muted);margin-top:2px}
    .ch-bar{height:2px;border-radius:99px;background:rgba(255,255,255,0.07);margin-top:6px;overflow:hidden}
    .ch-bar-fill{height:100%;border-radius:99px;background:var(--red);transition:width 0.8s ease}
    .ch-prog{font-size:10px;color:rgba(255,255,255,0.25);margin-top:3px}
    .ch-aura{font-size:11px;font-weight:700;color:rgba(255,43,43,0.7);flex-shrink:0}
    .ch-done{width:20px;height:20px;border-radius:50%;background:rgba(255,43,43,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}

    /* Achievements */
    .ach-earned{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
    .ach-badge{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;border-radius:14px;background:rgba(255,43,43,0.07);border:1px solid rgba(255,43,43,0.15)}
    .ach-emoji{font-size:24px;line-height:1}
    .ach-name{font-size:9px;font-weight:700;color:rgba(255,255,255,0.6);text-align:center;line-height:1.2}
    .ach-locked{display:flex;flex-wrap:wrap;gap:6px}
    .ach-locked-item{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06)}
    .ach-locked-emoji{font-size:14px;filter:grayscale(1);opacity:0.3}
    .ach-locked-name{font-size:10px;font-weight:600;color:rgba(255,255,255,0.2)}
    .ach-locked-aura{font-size:10px;color:rgba(255,43,43,0.4);font-weight:700;margin-left:2px}

    /* Reset timer */
    .reset-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);font-size:10px;font-weight:600;color:rgba(255,255,255,0.3);margin-bottom:10px}

    /* Bottom nav */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(64px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:rgba(6,6,8,0.92);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:100}
    .nav-link{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-decoration:none;color:rgba(255,255,255,0.3);font-size:10px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase}
    .nav-link.active{color:var(--red)}
    .nav-link svg{width:22px;height:22px}
    .nav-link.active svg{filter:drop-shadow(0 0 5px rgba(255,43,43,0.5))}

    .skeleton{background:rgba(255,255,255,0.04);border-radius:12px;animation:skeletonPulse 1.5s ease-in-out infinite}
    @keyframes skeletonPulse{0%,100%{opacity:1}50%{opacity:0.4}}
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="page">

    <div class="page-header">
      <div class="page-title">✦ Аура</div>
      <div class="page-sub" id="pageSubtitle">Загружаем...</div>
    </div>

    <!-- Aura hero -->
    <div class="aura-hero">
      <div class="aura-orb" id="auraOrb">
        <div class="aura-orb-ring" id="auraOrbRing"></div>
        <span id="auraOrbEmoji">✦</span>
      </div>
      <div style="flex:1;min-width:0;">
        <div class="aura-pts" id="auraPts">—</div>
        <div class="aura-rank-name" id="auraRankName">—</div>
        <div class="aura-bar-wrap">
          <div class="aura-bar-bg"><div class="aura-bar-fill" id="auraBarFill" style="width:0%"></div></div>
          <div class="aura-next-lbl" id="auraNextLbl"></div>
        </div>
      </div>
    </div>

    <!-- Earn grid -->
    <div class="earn-grid">
      <div class="earn-card"><div class="earn-icon">🎵</div><div class="earn-val">+1</div><div class="earn-lbl">за трек раз в 10 мин</div></div>
      <div class="earn-card"><div class="earn-icon">❤️</div><div class="earn-val">+5</div><div class="earn-lbl">за реакцию на твой трек</div></div>
      <div class="earn-card"><div class="earn-icon">📡</div><div class="earn-val">+10–40</div><div class="earn-lbl">за принятый сигнал</div></div>
      <div class="earn-card"><div class="earn-icon">🔥</div><div class="earn-val">+15–50</div><div class="earn-lbl">бонус за стрик</div></div>
    </div>

    <!-- Challenges -->
    <div class="sec">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div class="sec-title" style="margin-bottom:0;">Челленджи недели</div>
        <div class="reset-badge" id="resetBadge">⏱ сброс через 7 дн.</div>
      </div>
      <div id="challengesList">
        <div class="skeleton" style="height:68px;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:68px;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:68px;"></div>
      </div>
    </div>

    <!-- Achievements -->
    <div class="sec">
      <div class="sec-title">Достижения</div>
      <div id="achEarned" class="ach-earned"></div>
      <div id="achLocked" class="ach-locked"></div>
    </div>

  </div>

  <nav class="bottom-nav">
    <a class="nav-link" href="/home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><path d="M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M17.66 6.34l-2.12 2.12M6.34 17.66l-2.12 2.12"/></svg>
      <span>Радар</span>
    </a>
    <a class="nav-link active" href="/aura">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span>Аура</span>
    </a>
    <a class="nav-link" href="/chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Чат</span>
    </a>
    <a class="nav-link" href="/profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Профиль</span>
    </a>
  </nav>

  <script src="/js/utils.js"></script>
  <script src="/js/aura.js"></script>
</body>
</html>
