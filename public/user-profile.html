<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>+aura</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#ff2b2b;--red-dim:rgba(255,43,43,0.15);--bg:#060608;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);--text:#fff;--muted:rgba(255,255,255,0.45)}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    body{padding-bottom:40px}
    .bg-glow{position:fixed;top:-10%;left:50%;transform:translateX(-50%);width:500px;height:300px;background:radial-gradient(ellipse,rgba(255,43,43,0.07) 0%,transparent 70%);pointer-events:none;z-index:0}
    .page{position:relative;z-index:1;max-width:480px;margin:0 auto}

    /* Collage */
    .cover{position:relative;height:220px;background:#0d0d12;overflow:hidden}
    .collage-grid{width:100%;height:100%;display:grid;gap:2px;position:absolute;inset:0}
    .collage-grid.n1{grid-template-columns:1fr}.collage-grid.n2{grid-template-columns:1fr 1fr}
    .collage-grid.n3{grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr}
    .collage-grid.n4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
    .collage-grid.n5,.collage-grid.n6{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr}
    .collage-cell{overflow:hidden;background:#1a1a22}.collage-cell.span2{grid-row:span 2}
    .collage-cell img{width:100%;height:100%;object-fit:cover;display:block}
    .cover-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,6,8,1) 0%,rgba(6,6,8,0.2) 55%,transparent 100%);pointer-events:none}
    .back-btn{position:absolute;top:calc(env(safe-area-inset-top)+12px);left:14px;z-index:10;width:36px;height:36px;border-radius:50%;background:rgba(6,6,8,0.7);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none}

    /* Avatar */
    .avatar-wrap{width:88px;height:88px;border-radius:50%;border:3px solid var(--bg);background:#1a1a22;overflow:hidden;flex-shrink:0;position:relative}
    .avatar-wrap img{width:100%;height:100%;object-fit:cover}
    .avatar-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:rgba(255,255,255,0.4)}
    .avatar-ring{position:absolute;inset:-4px;border-radius:50%;pointer-events:none}

    /* Info */
    .name{font-size:24px;font-weight:900;letter-spacing:-0.4px;line-height:1.1}
    .username-tag{font-size:13px;color:var(--muted);font-weight:600;margin-top:3px}
    .bio{font-size:14px;line-height:1.6;color:rgba(255,255,255,0.65);margin-top:8px}

    /* Aura block */
    .aura-block{margin:14px 20px 0;padding:16px 18px;border-radius:20px;background:linear-gradient(135deg,rgba(255,43,43,0.1),rgba(255,43,43,0.04));border:1px solid rgba(255,43,43,0.18);display:flex;align-items:center;gap:14px}
    .aura-icon{font-size:26px;flex-shrink:0}
    .aura-score{font-size:26px;font-weight:900;letter-spacing:-0.5px;line-height:1}
    .aura-rank{font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px}
    .aura-bar-bg{flex:1;height:4px;border-radius:99px;background:rgba(255,255,255,0.08);overflow:hidden}
    .aura-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--red),rgba(255,100,100,0.8));transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1)}

    /* Stats */
    .stats-row{display:flex;margin:10px 20px 0;border-radius:14px;overflow:hidden;border:1px solid var(--border);background:var(--surface)}
    .stat-item{flex:1;padding:11px 8px;text-align:center;border-right:1px solid var(--border)}
    .stat-item:last-child{border-right:none}
    .stat-val{font-size:17px;font-weight:900;letter-spacing:-0.3px}
    .stat-val.red{color:var(--red)}
    .stat-lbl{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px}

    /* Now playing */
    .now-playing{margin:12px 20px 0;padding:13px 15px;border-radius:16px;background:rgba(255,43,43,0.06);border:1px solid rgba(255,43,43,0.2);display:none;align-items:center;gap:12px}
    .now-playing.visible{display:flex}
    .np-cover{width:42px;height:42px;border-radius:10px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,0.06)}
    .np-dot{width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red);flex-shrink:0;animation:pulseDot 1.8s ease-in-out infinite}
    @keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(255,43,43,0.6)}50%{box-shadow:0 0 0 5px transparent}}
    .np-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--red)}
    .np-title{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .np-artist{font-size:12px;color:var(--muted);margin-top:1px}

    /* Compat */
    .compat-block{margin:10px 20px 0;padding:13px 15px;border-radius:16px;background:var(--surface);border:1px solid var(--border)}

    /* Actions */
    .actions{margin:12px 20px 0;display:flex;gap:8px}
    .btn-signal{flex:1;padding:14px;border-radius:14px;background:var(--red);color:#fff;border:none;font:800 14px/1 Inter,sans-serif;cursor:pointer}
    .btn-signal.sent{background:rgba(34,197,94,0.15);color:#86efac;border:1px solid rgba(34,197,94,0.25)}
    .btn-icon{width:46px;height:46px;border-radius:12px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0}
    @keyframes buzzAnim{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
    .buzzing{animation:buzzAnim 0.4s ease}

    /* Top artists */
    .sec-wrap{margin-top:20px}
    .sec-bg-title{display:block;font-size:64px;font-weight:900;letter-spacing:-2px;text-transform:lowercase;line-height:0.85;pointer-events:none;user-select:none;padding-left:18px;margin-bottom:-8px}
    .sec-content{position:relative}
    .artists-row{display:flex;gap:0;padding:0 20px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
    .artists-row::-webkit-scrollbar{display:none}
    .artist-card{flex-shrink:0;width:84px;margin-right:12px;text-align:center}
    .artist-img{position:relative;width:84px;height:84px;border-radius:50%;background:#1a1a22;margin-bottom:6px;overflow:hidden}
    .artist-img img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .artist-rank-badge{position:absolute;bottom:2px;right:2px;width:20px;height:20px;border-radius:50%;background:rgba(10,10,14,0.95);color:#fff;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.15)}
    .artist-name{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:rgba(255,255,255,0.8)}

    /* On repeat */
    .repeat-row{display:flex;padding:0 20px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
    .repeat-row::-webkit-scrollbar{display:none}
    .repeat-card{flex-shrink:0;width:128px;margin-right:12px}
    .repeat-cover{position:relative;width:128px;height:128px;border-radius:14px;overflow:hidden;background:#1a1a22;margin-bottom:8px;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
    .repeat-cover img{width:100%;height:100%;object-fit:cover}
    .repeat-count{position:absolute;bottom:7px;left:7px;padding:3px 9px;border-radius:99px;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);font-size:11px;font-weight:700;color:rgba(255,255,255,0.85)}
    .repeat-title{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .repeat-artist{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}

    /* Genres */
    .genres-wrap{padding:0 20px;margin-top:8px;display:flex;flex-wrap:nowrap;gap:8px;overflow:hidden}
    .genre-tag{font-size:13px;font-weight:600;color:rgba(255,255,255,0.5);flex-shrink:0}

    /* Ticker */
    .ticker-section{margin:14px 20px 0}
    .ticker-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:7px}
    .ticker-wrap{overflow:hidden;border-radius:12px;background:var(--surface);border:1px solid var(--border);padding:9px 0;position:relative}
    .ticker-wrap::before,.ticker-wrap::after{content:'';position:absolute;top:0;bottom:0;width:28px;z-index:2;pointer-events:none}
    .ticker-wrap::before{left:0;background:linear-gradient(to right,rgba(6,6,8,1),transparent)}
    .ticker-wrap::after{right:0;background:linear-gradient(to left,rgba(6,6,8,1),transparent)}
    .ticker-track{display:flex;width:max-content;animation:ticker 25s linear infinite}
    @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    .ticker-item{display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0;white-space:nowrap}
    .ticker-cover{width:26px;height:26px;border-radius:6px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,0.08)}
    .ticker-text{font-size:12px;font-weight:700;color:rgba(255,255,255,0.7)}
    .ticker-artist{font-size:11px;color:var(--muted);margin-left:2px}

    /* Badges */
    .badges-row{display:flex;gap:8px;padding:0 20px;margin-top:12px;flex-wrap:nowrap;overflow:hidden}

    /* Toast */
    .toast{position:fixed;top:calc(env(safe-area-inset-top)+16px);left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:14px;font:700 13px/1 Inter,sans-serif;z-index:999;backdrop-filter:blur(20px);display:none;white-space:nowrap;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#86efac}

    @keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="toast" id="toast"></div>

<div class="page">
  <!-- Collage / Cover -->
  <div class="cover" id="coverBlock">
    <div id="collageGrid"></div>
    <div class="cover-overlay"></div>
    <a class="back-btn" id="backBtn" href="/home">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </a>
  </div>

  <!-- Avatar row -->
  <div style="position:relative;padding:0 20px;margin-top:-44px;display:flex;align-items:flex-end;justify-content:space-between;">
    <div class="avatar-wrap" id="avatarWrap">
      <div class="avatar-ph" id="avatarPh">?</div>
      <img id="avatarImg" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;" />
      <div class="avatar-ring" id="avatarRing"></div>
    </div>
    <button onclick="shareProfile()" style="display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:12px;background:var(--surface);border:1px solid var(--border);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;margin-bottom:4px;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      Поделиться
    </button>
  </div>

  <!-- Name + username -->
  <div style="padding:10px 20px 0;">
    <div class="name" id="userName">—</div>
    <div class="username-tag" id="userUsername"></div>
    <div id="userTitle" style="font-size:12px;font-weight:700;color:rgba(255,140,0,0.9);margin-top:3px;display:none;"></div>
    <div class="bio" id="userBio" style="display:none;"></div>
  </div>

  <!-- Aura -->
  <div class="aura-block" id="auraBlock" style="display:none;">
    <div class="aura-icon" id="auraIcon">✦</div>
    <div style="flex:1;min-width:0;">
      <div class="aura-score" id="auraScore">0</div>
      <div class="aura-rank" id="auraRank">Новичок</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0;min-width:80px;">
      <div class="aura-bar-bg"><div class="aura-bar-fill" id="auraBarFill" style="width:0%"></div></div>
      <div style="font-size:10px;color:rgba(255,255,255,0.25);font-weight:600;" id="auraNext"></div>
    </div>
  </div>

  <!-- Achievement badges -->
  <div class="badges-row" id="badgesRow" style="display:none;"></div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow" style="display:none;">
    <div class="stat-item"><div class="stat-val red" id="statSignals">0</div><div class="stat-lbl">Сигналы</div></div>
    <div class="stat-item"><div class="stat-val" id="statStreak">0</div><div class="stat-lbl">🔥 Стрик</div></div>
    <div class="stat-item"><div class="stat-val" id="statTracks">0</div><div class="stat-lbl">Треков</div></div>
  </div>

  <!-- Now playing -->
  <div class="now-playing" id="nowPlayingBlock">
    <img class="np-cover" id="npCover" src="" alt="" style="display:none;" />
    <div class="np-dot"></div>
    <div style="flex:1;min-width:0;">
      <div class="np-label">сейчас играет</div>
      <div class="np-title" id="npTitle">—</div>
      <div class="np-artist" id="npArtist"></div>
    </div>
  </div>

  <!-- Compat + Actions (только не для себя) -->
  <div id="actionsSection" style="display:none;">
    <div class="compat-block" id="compatBlock" style="display:none;">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.3);margin-bottom:8px;">Совместимость вкусов</div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="font-size:32px;font-weight:900;letter-spacing:-1px;color:#ff2b2b;" id="compatPct">—</div>
        <div style="flex:1;">
          <div style="height:4px;border-radius:99px;background:rgba(255,255,255,0.08);overflow:hidden;margin-bottom:6px;"><div id="compatFill" style="height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#ff2b2b,#ff8c00);transition:width 1s cubic-bezier(0.34,1.56,0.64,1);"></div></div>
          <div id="compatLabel" style="font-size:12px;color:rgba(255,255,255,0.45);line-height:1.5;"></div>
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn-signal" id="signalBtn">📡 Сигнал</button>
      <button class="btn-icon" id="friendBtn" title="Добавить в друзья">🤝</button>
      <button class="btn-icon buzzing-target" id="buzzBtn" title="Buzz!">💢</button>
    </div>
  </div>

  <!-- Ticker -->
  <div class="ticker-section" id="tickerSection" style="display:none;">
    <div class="ticker-label">Недавно слушал</div>
    <div class="ticker-wrap"><div class="ticker-track" id="tickerTrack"></div></div>
  </div>

  <!-- Top Artists -->
  <div class="sec-wrap" id="topArtistsSection" style="display:none;">
    <div class="sec-bg-title" style="color:rgba(255,255,255,0.04);">топ<br>артисты</div>
    <div class="sec-content">
      <div class="artists-row" id="topArtistsRow"></div>
    </div>
  </div>

  <!-- On Repeat -->
  <div class="sec-wrap" id="onRepeatSection" style="display:none;">
    <div class="sec-bg-title" style="color:rgba(255,43,43,0.07);">на<br>повторе</div>
    <div class="sec-content">
      <div class="repeat-row" id="onRepeatRow"></div>
    </div>
  </div>

  <!-- Genres -->
  <div class="genres-wrap" id="genresWrap" style="display:none;"></div>

</div>

<script src="/js/utils.js"></script>
<script>
(function() {
  const U = window.AuraUtils;
  let me = null, profileUser = null;

  function showToast(text) {
    const t = document.getElementById('toast');
    t.textContent = text; t.style.display = 'block';
    clearTimeout(t._t); t._t = setTimeout(() => t.style.display = 'none', 2500);
  }

  function timeAgo(ts) {
    const d = Math.floor((Date.now()-ts)/1000);
    if (d < 60) return 'только что';
    if (d < 3600) return Math.floor(d/60)+' мин';
    if (d < 86400) return Math.floor(d/3600)+' ч';
    return Math.floor(d/86400)+' д';
  }

  const RANKS = [
    {min:0,name:'Новичок',emoji:'🌱',color:'rgba(255,255,255,0.2)'},
    {min:10,name:'Слушатель',emoji:'🎧',color:'#60a5fa'},
    {min:30,name:'Меломан',emoji:'🎵',color:'#c084fc'},
    {min:75,name:'Вибратор',emoji:'📡',color:'#ff8c00'},
    {min:150,name:'Резонатор',emoji:'🌊',color:'#ff6b35'},
    {min:300,name:'Аурист',emoji:'✦',color:'#ff2b2b'},
    {min:600,name:'Легенда',emoji:'👑',color:'#ffd700'},
  ];
  function getRank(pts) {
    for (let i=RANKS.length-1;i>=0;i--) if(pts>=RANKS[i].min) return {rank:RANKS[i],next:RANKS[i+1]||null};
    return {rank:RANKS[0],next:RANKS[1]};
  }

  function renderAura(pts) {
    const {rank,next} = getRank(pts);
    const block = document.getElementById('auraBlock');
    if (block) block.style.display = '';
    document.getElementById('auraScore').textContent = pts;
    document.getElementById('auraRank').textContent  = rank.emoji+' '+rank.name;
    document.getElementById('auraIcon').textContent  = rank.emoji;
    if (next) {
      const pct = Math.min(100,Math.round((pts-rank.min)/(next.min-rank.min)*100));
      setTimeout(()=>document.getElementById('auraBarFill').style.width=pct+'%',300);
      document.getElementById('auraNext').textContent=(next.min-pts)+' до '+next.name;
    }
    // Цвет кольца аватара
    const ring = document.getElementById('avatarRing');
    if (ring) {
      ring.style.cssText=`position:absolute;inset:-4px;border-radius:50%;border:2.5px solid ${rank.color};box-shadow:0 0 10px ${rank.color}40;pointer-events:none;`;
    }
    // Цвет блока ауры
    const ab = document.getElementById('auraBlock');
    if (ab) { ab.style.borderColor=rank.color; ab.style.boxShadow=`0 0 16px ${rank.color}25`; }
    const fill=document.getElementById('auraBarFill');
    if (fill) fill.style.background=`linear-gradient(90deg,${rank.color},${rank.color}88)`;
  }

  function renderCollage(photos) {
    const grid = document.getElementById('collageGrid');
    if (!grid) return;
    const n = (photos||[]).length;
    grid.className='collage-grid n'+Math.min(n,6);
    grid.style.cssText='width:100%;height:100%;display:grid;gap:2px;position:absolute;inset:0;';
    if (!n) { grid.innerHTML='<div style="width:100%;height:100%;background:linear-gradient(135deg,#0d0d16,#1a0a1a);"></div>'; return; }
    photos.slice(0,6).forEach((src,i)=>{
      const cell=document.createElement('div');
      cell.className='collage-cell'+(i===0&&n===3?' span2':'');
      cell.innerHTML=`<img src="${src}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;" />`;
      grid.appendChild(cell);
    });
  }

  function renderMusicStats(history) {
    if (!history?.length) return;
    const artistMap={}, trackMap={};
    history.forEach(t=>{
      if(t.artist){ if(!artistMap[t.artist]) artistMap[t.artist]={name:t.artist,image:'',count:0}; artistMap[t.artist].count++; if(t.image&&!artistMap[t.artist].image) artistMap[t.artist].image=t.image; }
      const key=t.track+'::'+t.artist;
      if(!trackMap[key]) trackMap[key]={track:t.track,artist:t.artist,image:t.image||'',count:0};
      trackMap[key].count++;
    });
    const topArtists=Object.values(artistMap).sort((a,b)=>b.count-a.count).slice(0,6);
    const topTracks=Object.values(trackMap).sort((a,b)=>b.count-a.count).slice(0,8);

    // Top artists
    if(topArtists.length>=1){
      const sec=document.getElementById('topArtistsSection');
      const row=document.getElementById('topArtistsRow');
      if(sec) sec.style.display='';
      if(row){
        row.innerHTML=topArtists.map((a,i)=>`
          <div class="artist-card">
            <div class="artist-img">
              <img id="up-art-${i}" src="${a.image||''}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;${a.image?'':'display:none'}" />
              <div id="up-art-ph-${i}" style="position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,0.06);display:${a.image?'none':'flex'};align-items:center;justify-content:center;">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
              </div>
              <div class="artist-rank-badge">${i+1}</div>
            </div>
            <div class="artist-name">${a.name}</div>
          </div>`).join('');
        // Загружаем фото с Deezer
        topArtists.forEach(async(a,i)=>{
          try{
            const r=await fetch(`/api/lastfm/artist-image?artist=${encodeURIComponent(a.name)}`).then(r=>r.json());
            if(r.image){
              const img=document.getElementById(`up-art-${i}`);
              const ph=document.getElementById(`up-art-ph-${i}`);
              if(img){img.src=r.image;img.style.display='';}
              if(ph) ph.style.display='none';
            }
          }catch(_){}
        });
      }
    }

    // On repeat
    if(topTracks.length>=1){
      const sec=document.getElementById('onRepeatSection');
      const row=document.getElementById('onRepeatRow');
      if(sec) sec.style.display='';
      if(row) row.innerHTML=topTracks.map(t=>`
        <div class="repeat-card">
          <div class="repeat-cover">
            ${t.image?`<img src="${t.image}" style="width:100%;height:100%;object-fit:cover;" />`:'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>'}
            <div class="repeat-count">${t.count} раз${t.count>1?'а':''}</div>
          </div>
          <div class="repeat-title">${t.track}</div>
          <div class="repeat-artist">${t.artist}</div>
        </div>`).join('');
    }

    // Ticker
    const tSec=document.getElementById('tickerSection');
    const tTrack=document.getElementById('tickerTrack');
    if(tSec&&tTrack&&history.length){
      tSec.style.display='';
      const items=history.slice(0,15).map(t=>`
        <div class="ticker-item">
          ${t.image?`<img class="ticker-cover" src="${t.image}" />`:''}
          <span class="ticker-text">${t.track||'?'}</span>
          <span class="ticker-artist">${t.artist||''}</span>
          <span style="color:rgba(255,255,255,0.1);margin:0 6px;">·</span>
        </div>`).join('');
      tTrack.innerHTML=items+items;
    }

    // Stat tracks
    document.getElementById('statTracks').textContent=history.length;
  }

  async function init() {
    me = await U.requireAuth().catch(()=>null);

    // Получаем профиль
    const path  = window.location.pathname;
    const nameOrId = path.startsWith('/u/') ? path.slice(3) : null;
    if (!nameOrId) { window.location.href='/home'; return; }

    const r = await fetch(`/api/user/${encodeURIComponent(nameOrId)}`).then(r=>r.json()).catch(()=>null);
    if (!r?.ok || !r.user) { document.getElementById('userName').textContent='Профиль не найден'; return; }
    profileUser = r.user;

    const isMe = me && me.id === profileUser.id;

    // Back button — если пришли из приложения
    const backBtn = document.getElementById('backBtn');
    if (document.referrer && new URL(document.referrer).origin === location.origin) {
      backBtn.href='javascript:history.back()';
    }

    // Collage
    renderCollage(profileUser.photos||[]);

    // Avatar
    const ai=document.getElementById('avatarImg');
    const ap=document.getElementById('avatarPh');
    if(profileUser.avatar){ai.src=profileUser.avatar;ai.style.display='block';ap.style.display='none';}
    else ap.textContent=(profileUser.name||'?')[0].toUpperCase();

    // Name
    document.getElementById('userName').textContent=profileUser.name||'—';
    if(profileUser.username){
      const ut=document.getElementById('userUsername');
      ut.textContent='@'+profileUser.username;
    }

    // Aura
    if((profileUser.auraPoints||0)>0 || profileUser.title) {
      renderAura(profileUser.auraPoints||0);
    }

    // Title
    if(profileUser.title){
      const te=document.getElementById('userTitle');
      te.textContent=profileUser.title; te.style.display='';
    }

    // Bio
    if(profileUser.bio){
      const be=document.getElementById('userBio');
      be.textContent=profileUser.bio; be.style.display='';
    }

    // Achievements badges
    if((profileUser.achievements||[]).length){
      const br=document.getElementById('badgesRow');
      br.style.display='flex';
      br.innerHTML=profileUser.achievements.slice(0,8).map(a=>{
        const def={first_track:'🎵',tracks_10:'🎧',tracks_50:'🎼',tracks_100:'⚡',streak_3:'🔥',streak_7:'💫',streak_30:'💀',has_avatar:'🖼️',has_bio:'📝',has_photos:'📸',has_username:'🏷️',aura_100:'✨',aura_300:'🌊',aura_600:'👑',first_signal:'📡',first_chat:'💬',signals_5:'🌍',signals_10:'🛸'};
        const emoji=def[a.id]||'🏆';
        return `<span style="font-size:22px;" title="${a.id}">${emoji}</span>`;
      }).join('');
    }

    // Stats
    if(profileUser.streakDays||profileUser.trackHistory?.length){
      document.getElementById('statsRow').style.display='flex';
      document.getElementById('statStreak').textContent=profileUser.streakDays||0;
    }

    // Now playing
    const ct=profileUser.currentTrack;
    if(ct?.track){
      const block=document.getElementById('nowPlayingBlock');
      block.classList.add('visible');
      document.getElementById('npTitle').textContent=ct.track;
      document.getElementById('npArtist').textContent=ct.artist||'';
      if(ct.image){const ci=document.getElementById('npCover');ci.src=ct.image;ci.style.display='block';}
    }

    // Music stats
    renderMusicStats(profileUser.trackHistory||[]);

    // Genres
    if((profileUser.genres||[]).length){
      const gw=document.getElementById('genresWrap');
      gw.style.display='flex';
      const unique=[...new Set(profileUser.genres)].slice(0,6);
      gw.innerHTML=unique.map((g,i)=>`<span class="genre-tag" style="color:rgba(255,255,255,${i===0?'0.6':'0.35'})">${g}</span>${i<unique.length-1?'<span style="color:rgba(255,255,255,0.1);font-size:11px;">·</span>':''}`).join('');
    }

    // Actions (не для себя)
    if (!isMe && me) {
      document.getElementById('actionsSection').style.display='';

      // Совместимость
      const myH=(me.trackHistory||[]).map(t=>t.artist?.toLowerCase()).filter(Boolean);
      const thH=(profileUser.trackHistory||[]).map(t=>t.artist?.toLowerCase()).filter(Boolean);
      if(myH.length&&thH.length){
        const s1=new Set(myH),s2=new Set(thH);
        const common=[...s1].filter(a=>s2.has(a)).length;
        const total=new Set([...s1,...s2]).size;
        const pct=total>0?Math.round(common/total*100):0;
        if(pct>0){
          document.getElementById('compatBlock').style.display='';
          document.getElementById('compatPct').textContent=pct+'%';
          setTimeout(()=>document.getElementById('compatFill').style.width=pct+'%',300);
          document.getElementById('compatLabel').textContent=pct>=70?'🔴 Почти одно и то же':pct>=40?'🟠 Похожие вкусы':pct>=15?'🟡 Есть пересечения':'⚫ Разные вкусы';
        }
      }

      // Signal
      const signalBtn=document.getElementById('signalBtn');
      try{
        const sd=await fetch('/api/signals?direction=sent').then(r=>r.json());
        const chats=await fetch('/api/chats').then(r=>r.json());
        if((sd.sentSignals||[]).some(s=>s.toId===profileUser.id&&s.status==='pending')){
          signalBtn.textContent='✓ Сигнал отправлен'; signalBtn.className='btn-signal sent'; signalBtn.disabled=true;
        } else if((chats.chats||[]).some(c=>c.other?.id===profileUser.id)){
          signalBtn.textContent='💬 Уже общаемся'; signalBtn.className='btn-signal sent'; signalBtn.disabled=true;
        }
      }catch(_){}
      signalBtn.addEventListener('click',async()=>{
        if(signalBtn.disabled) return;
        signalBtn.disabled=true; signalBtn.textContent='...';
        try{
          const rr=await fetch('/api/signals',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({toId:profileUser.id,type:'wave',track:ct?.track||'',artist:ct?.artist||'',matchType:'same-vibe'})});
          const d=await rr.json();
          if(rr.ok&&d.ok){signalBtn.textContent='✓ Отправлен';signalBtn.className='btn-signal sent';showToast('Сигнал отправлен!');}
          else if(rr.status===409){signalBtn.textContent='✓ Уже отправлен';signalBtn.className='btn-signal sent';}
          else{signalBtn.disabled=false;signalBtn.textContent='📡 Сигнал';}
        }catch(_){signalBtn.disabled=false;signalBtn.textContent='📡 Сигнал';}
      });

      // Friend
      const friendBtn=document.getElementById('friendBtn');
      try{const fr=await fetch(`/api/friends/check/${profileUser.id}`).then(r=>r.json());if(fr.isFriend){friendBtn.textContent='✅';friendBtn.style.borderColor='rgba(34,197,94,0.3)';}}catch(_){}
      friendBtn.addEventListener('click',async()=>{
        const isFr=friendBtn.textContent==='✅';
        if(isFr){await fetch('/api/friends/remove',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({toId:profileUser.id})});friendBtn.textContent='🤝';friendBtn.style.borderColor='';showToast('Удалён из друзей');}
        else{const rr=await fetch('/api/friends/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({toId:profileUser.id})});if((await rr.json()).ok){friendBtn.textContent='✅';friendBtn.style.borderColor='rgba(34,197,94,0.3)';showToast(profileUser.name+' теперь твой друг!');}}
      });

      // Buzz
      document.getElementById('buzzBtn').addEventListener('click',async()=>{
        navigator.vibrate?.([50,30,50,30,100]);
        document.querySelector('.buzzing-target').classList.add('buzzing');
        setTimeout(()=>document.querySelector('.buzzing-target').classList.remove('buzzing'),400);
        await fetch('/api/reactions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({toId:profileUser.id,track:ct?.track||'',artist:ct?.artist||'',emoji:'💢'})}).catch(()=>{});
        showToast('Buzz отправлен '+profileUser.name+'!');
      });
    } else if (isMe) {
      // Для себя — кнопка редактировать
      const act=document.getElementById('actionsSection');
      act.style.display='';
      act.innerHTML=`<div style="margin:0 0 16px;"><a href="/profile" style="display:block;padding:14px;border-radius:14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);text-align:center;font:700 13px/1 Inter,sans-serif;color:rgba(255,255,255,0.6);text-decoration:none;">✏️ Редактировать профиль</a></div>`;
    }
  }

  window.shareProfile = function() {
    const url = location.href;
    if(navigator.share) navigator.share({title:'+aura',url});
    else { navigator.clipboard?.writeText(url); showToast('Ссылка скопирована!'); }
  };

  init();
})();
</script>
</body>
</html>
