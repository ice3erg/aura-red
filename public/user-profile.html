<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>+aura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#ff2b2b;--red-dim:rgba(255,43,43,0.15);--bg:#060608;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);--text:#fff;--muted:rgba(255,255,255,0.45)}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    body{padding-bottom:calc(32px + env(safe-area-inset-bottom))}

    .bg-glow{position:fixed;top:-10%;left:50%;transform:translateX(-50%);width:500px;height:300px;background:radial-gradient(ellipse,rgba(255,43,43,0.08) 0%,transparent 70%);pointer-events:none;z-index:0}

    .page{position:relative;z-index:1;max-width:480px;margin:0 auto}

    /* Cover / Collage */
    .cover{position:relative;height:220px;background:#0d0d12;overflow:hidden}
    .cover-img{width:100%;height:100%;object-fit:cover;display:none}
    .cover-img.visible{display:block}
    .cover-ph{width:100%;height:100%;background:linear-gradient(135deg,#0d0d16 0%,#1a1a2e 100%)}
    .cover-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,6,8,1) 0%,rgba(6,6,8,0.3) 60%,transparent 100%)}
    /* Photo collage */
    .collage-grid{width:100%;height:100%;display:grid;gap:2px;position:absolute;inset:0}
    .collage-grid.n1{grid-template-columns:1fr}
    .collage-grid.n2{grid-template-columns:1fr 1fr}
    .collage-grid.n3{grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr}
    .collage-grid.n4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
    .collage-grid.n5,.collage-grid.n6{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr}
    .collage-cell{overflow:hidden;background:#1a1a22}
    .collage-cell.span2{grid-row:span 2}
    .collage-cell img{width:100%;height:100%;object-fit:cover;display:block}

    /* Back button */
    .back-btn{position:absolute;top:calc(env(safe-area-inset-top)+12px);left:14px;z-index:10;width:36px;height:36px;border-radius:50%;background:rgba(6,6,8,0.7);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none}

    /* Avatar */
    .avatar-wrap{width:92px;height:92px;border-radius:50%;border:3px solid var(--bg);background:#1a1a22;overflow:hidden;flex-shrink:0}
    .avatar-wrap img{width:100%;height:100%;object-fit:cover}
    .avatar-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;color:rgba(255,255,255,0.4)}

    /* Share btn */
    .share-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);font:700 12px/1 Inter,sans-serif;color:rgba(255,255,255,0.6);cursor:pointer;transition:color 0.2s,border-color 0.2s}
    .share-btn:hover{color:#fff;border-color:rgba(255,255,255,0.2)}

    /* Info */
    .info{padding:14px 20px 0}
    .name{font-size:26px;font-weight:900;letter-spacing:-0.4px;line-height:1.1}
    .meta{font-size:13px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .meta-dot{width:3px;height:3px;border-radius:50%;background:var(--muted)}
    .bio{font-size:14px;line-height:1.6;color:rgba(255,255,255,0.7);margin-top:12px}

    /* Now playing */
    .now-playing{margin:16px 20px 0;padding:14px 16px;border-radius:18px;background:rgba(255,43,43,0.06);border:1px solid rgba(255,43,43,0.2);display:none;align-items:center;gap:12px}
    .now-playing.visible{display:flex}
    .np-cover{width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,0.06)}
    .np-dot{width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red);flex-shrink:0;animation:pulseDot 1.8s ease-in-out infinite}
    @keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(255,43,43,0.6)}50%{box-shadow:0 0 0 5px transparent}}
    .np-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--red)}
    .np-title{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
    .np-artist{font-size:12px;color:var(--muted);margin-top:1px}

    /* Signal button */
    .signal-section{margin:16px 20px 0}
    .signal-btn{width:100%;padding:16px;border-radius:16px;background:var(--red);color:#fff;border:none;font:800 15px/1 Inter,sans-serif;cursor:pointer;transition:opacity 0.15s,transform 0.1s;letter-spacing:-0.1px}
    .signal-btn:hover{opacity:0.92}
    .signal-btn:active{transform:scale(0.98)}
    .signal-btn:disabled{opacity:0.4;cursor:default;transform:none}
    .signal-btn.sent{background:rgba(34,197,94,0.15);color:#86efac;border:1px solid rgba(34,197,94,0.25)}

    /* Track history */
    .section{margin:20px 20px 0}
    .section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:10px;padding:0 2px}
    .track-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;background:var(--surface);border:1px solid var(--border);margin-bottom:6px}
    .track-cover{width:38px;height:38px;border-radius:8px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,0.06)}
    .track-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .track-artist{font-size:11px;color:var(--muted);margin-top:2px}
    .track-ago{font-size:11px;color:rgba(255,255,255,0.25);flex-shrink:0}

    /* Photos */
    .photos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;border-radius:16px;overflow:hidden}
    .photos-grid img{width:100%;aspect-ratio:1;object-fit:cover;display:block}

    /* Notice */
    .toast{position:fixed;top:calc(env(safe-area-inset-top)+16px);left:50%;transform:translateX(-50%);background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#86efac;border-radius:14px;padding:12px 20px;font:700 13px/1 Inter,sans-serif;z-index:999;backdrop-filter:blur(20px);display:none;white-space:nowrap}

    @keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .info,.now-playing,.signal-section,.section{animation:fadeInUp 0.35s ease both}
  </style>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#060608">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="+aura">
  <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>
  <div class="bg-glow"></div>
  <div class="toast" id="toast"></div>

  <div class="page">
    <div class="cover" id="coverBlock">
      <div class="cover-ph" id="coverPh"></div>
      <img class="cover-img" id="coverImg" src="" alt="" />
      <div class="cover-overlay"></div>
      <a class="back-btn" href="/home">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </a>
    </div>

    <!-- Avatar row — вне cover чтобы не срезался -->
    <div style="position:relative;padding:0 20px;margin-top:-46px;margin-bottom:0;display:flex;align-items:flex-end;justify-content:space-between;">
      <div class="avatar-wrap" id="avatarWrap" style="position:relative;bottom:0;left:0;flex-shrink:0;">
        <div class="avatar-ph" id="avatarPh">?</div>
        <img id="avatarImg" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;" />
      </div>
      <button class="share-btn" id="shareBtn" onclick="shareProfile()" style="position:relative;bottom:0;right:0;margin-bottom:4px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        Поделиться
      </button>
    </div>

    <div class="info" id="infoBlock">
      <div class="name" id="userName">—</div>
      <div class="meta" id="userMeta"></div>
      <div class="bio" id="userBio" style="display:none"></div>
    </div>

    <!-- Now playing -->
    <div class="now-playing" id="nowPlayingBlock">
      <img class="np-cover" id="npCover" src="" alt="" />
      <div class="np-dot"></div>
      <div style="flex:1;min-width:0;">
        <div class="np-label">сейчас играет</div>
        <div class="np-title" id="npTitle">—</div>
        <div class="np-artist" id="npArtist">—</div>
      </div>
    </div>

    <!-- Signal button (скрыт для себя) -->
    <div class="signal-section" id="signalSection" style="display:none">
      <!-- Совместимость вкусов -->
      <div id="compatBlock" style="display:none;margin-bottom:12px;padding:14px 16px;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.35);margin-bottom:10px;">Совместимость вкусов</div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="text-align:center;flex-shrink:0;">
            <div id="compatPct" style="font-size:34px;font-weight:900;letter-spacing:-1px;color:#ff2b2b;">—</div>
            <div style="font-size:10px;color:rgba(255,255,255,0.35);font-weight:600;margin-top:2px;">совпадение</div>
          </div>
          <div style="flex:1;min-width:0;">
            <div style="height:5px;border-radius:99px;background:rgba(255,255,255,0.08);overflow:hidden;margin-bottom:8px;">
              <div id="compatFill" style="height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#ff2b2b,#ff8c00);transition:width 1s cubic-bezier(0.34,1.56,0.64,1);"></div>
            </div>
            <div id="compatLabel" style="font-size:12px;color:rgba(255,255,255,0.5);line-height:1.5;"></div>
          </div>
        </div>
      </div>
      <button class="signal-btn" id="signalBtn">📡 Отправить сигнал</button>
    </div>

    <!-- Track history -->
    <div class="section" id="historySection" style="display:none">
      <div class="section-title">Недавно слушал</div>
      <div id="trackList"></div>
    </div>

    <!-- Photos показываются как коллаж сверху -->
  </div>

  <script src="/js/utils.js"></script>
  <script>
  (function() {
    const U = window.AuraUtils;

    function timeAgo(ts) {
      const d = Math.floor((Date.now() - ts) / 1000);
      if (d < 60)    return 'только что';
      if (d < 3600)  return Math.floor(d/60) + ' мин';
      if (d < 86400) return Math.floor(d/3600) + ' ч';
      return Math.floor(d/86400) + ' д';
    }

    function showToast(text, color = '#86efac', border = 'rgba(34,197,94,0.3)') {
      const t = document.getElementById('toast');
      t.textContent = text;
      t.style.background = `rgba(34,197,94,0.15)`;
      t.style.borderColor = border;
      t.style.color = color;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }

    function shareProfile() {
      const url = location.href;
      if (navigator.share) {
        navigator.share({ title: '+aura', url });
      } else {
        navigator.clipboard?.writeText(url);
        showToast('Ссылка скопирована!');
      }
    }
    window.shareProfile = shareProfile;

    async function init() {
      // Получаем имя из URL /u/:name
      const nameFromUrl = decodeURIComponent(location.pathname.split('/u/')[1] || '');
      if (!nameFromUrl) { location.href = '/home'; return; }

      // Грузим профиль
      let profileUser = null;
      try {
        const r = await fetch(`/api/user/${encodeURIComponent(nameFromUrl)}`);
        const d = await r.json();
        if (!d.ok) { location.href = '/home'; return; }
        profileUser = d.user;
      } catch { location.href = '/home'; return; }

      // Текущий пользователь
      const me = await U.fetchMe().catch(() => null);

      // Заполняем
      document.title = `${profileUser.name} — +aura`;

      // Cover / Photo collage
      const photos = Array.isArray(profileUser.photos) ? profileUser.photos : [];
      const coverBlock = document.getElementById('coverBlock');
      if (photos.length > 0) {
        // Строим коллаж из фото
        document.getElementById('coverPh').style.display = 'none';
        const n = Math.min(photos.length, 6);
        const grid = document.createElement('div');
        grid.className = `collage-grid n${n}`;
        photos.slice(0, n).forEach((src, i) => {
          const cell = document.createElement('div');
          cell.className = 'collage-cell' + (n === 3 && i === 0 ? ' span2' : '');
          const img = document.createElement('img');
          img.src = src; img.alt = '';
          cell.appendChild(img);
          grid.appendChild(cell);
        });
        coverBlock.insertBefore(grid, coverBlock.firstChild);
      } else if (profileUser.cover) {
        const ci = document.getElementById('coverImg');
        ci.src = profileUser.cover; ci.classList.add('visible');
        document.getElementById('coverPh').style.display = 'none';
      }

      // Avatar
      const ai = document.getElementById('avatarImg');
      const ap = document.getElementById('avatarPh');
      if (profileUser.avatar) {
        ai.src = profileUser.avatar; ai.style.display = 'block';
        ap.style.display = 'none';
      } else {
        ap.textContent = (profileUser.name || '?')[0].toUpperCase();
      }

      // Name + meta
      document.getElementById('userName').textContent = profileUser.name || '—';
      const meta = [];
      if (profileUser.city) meta.push(`📍 ${profileUser.city}`);
      if (profileUser.age)  meta.push(`${profileUser.age} лет`);
      const metaEl = document.getElementById('userMeta');
      metaEl.innerHTML = meta.map((m,i) => i > 0 ? `<span class="meta-dot"></span>${m}` : m).join('');

      // Bio
      if (profileUser.bio) {
        const bioEl = document.getElementById('userBio');
        bioEl.textContent = profileUser.bio;
        bioEl.style.display = '';
      }

      // Now playing
      const ct = profileUser.currentTrack;
      if (ct?.track) {
        const npBlock = document.getElementById('nowPlayingBlock');
        npBlock.classList.add('visible');
        document.getElementById('npTitle').textContent  = ct.track;
        document.getElementById('npArtist').textContent = ct.artist || '—';
        const npCover = document.getElementById('npCover');
        if (ct.image) { npCover.src = ct.image; npCover.style.display = 'block'; }
        else npCover.style.display = 'none';
      }

      // Signal button (не показываем себе)
      const isMe = me && me.id === profileUser.id;

      // Совместимость вкусов
      if (!isMe && me) {
        const myH    = Array.isArray(me.trackHistory)          ? me.trackHistory          : [];
        const theirH = Array.isArray(profileUser.trackHistory) ? profileUser.trackHistory : [];
        if (myH.length && theirH.length) {
          const myArt    = new Set(myH.map(t => t.artist?.toLowerCase()).filter(Boolean));
          const theirArt = new Set(theirH.map(t => t.artist?.toLowerCase()).filter(Boolean));
          const common   = [...myArt].filter(a => theirArt.has(a));
          const total    = new Set([...myArt, ...theirArt]).size;
          const pct      = total > 0 ? Math.round(common.length / total * 100) : 0;

          if (pct > 0 || myH.length > 2) {
            document.getElementById('compatBlock').style.display = '';
            document.getElementById('compatPct').textContent = pct + '%';
            setTimeout(() => {
              document.getElementById('compatFill').style.width = pct + '%';
            }, 400);
            const label = pct >= 70 ? '🔥 Очень похожие вкусы!' :
                          pct >= 40 ? '✨ Много общего' :
                          pct >= 15 ? '🎵 Есть пересечения' : '🌍 Разные вкусы';
            const commonNames = common.slice(0,3).map(a =>
              myH.find(t => t.artist?.toLowerCase() === a)?.artist || a
            );
            document.getElementById('compatLabel').innerHTML =
              `<b style="color:#fff">${label}</b>${common.length ? '<br>Оба слушают: ' + commonNames.join(', ') + (common.length > 3 ? ` +${common.length-3}` : '') : ''}`;
          }
        }
      }
      if (!isMe && me) {
        const section = document.getElementById('signalSection');
        const btn = document.getElementById('signalBtn');
        section.style.display = '';

        // Проверяем не отправлен ли уже сигнал
        try {
          const sr = await fetch('/api/signals?direction=sent');
          const sd = await sr.json();
          const already = (sd.sentSignals || []).some(s =>
            s.toId === profileUser.id && s.status === 'pending'
          );
          if (already) {
            btn.textContent = '✓ Сигнал отправлен';
            btn.className = 'signal-btn sent';
            btn.disabled = true;
          }
        } catch {}

        // Проверяем не в чате ли уже
        try {
          const chatsR = await fetch('/api/chats').then(r=>r.json());
          if (chatsR.ok) {
            const hasChat = (chatsR.chats||[]).some(ch => ch.other?.id === profileUser.id);
            if (hasChat) {
              btn.textContent = '💬 Уже общаемся';
              btn.className = 'signal-btn sent';
              btn.disabled = true;
            }
          }
        } catch {}

        btn.addEventListener('click', async () => {
          if (btn.disabled) return;
          btn.disabled = true; btn.textContent = 'Отправляем...';
          try {
            const track = ct?.track || '';
            const artist = ct?.artist || '';
            const r = await fetch('/api/signals', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ toId: profileUser.id, type: 'wave', track, artist, matchType: 'same-vibe' })
            });
            const d = await r.json();
            if (r.ok && d.ok) {
              btn.textContent = '✓ Сигнал отправлен';
              btn.className = 'signal-btn sent';
              showToast(`Сигнал отправлен ${profileUser.name}!`);
            } else if (r.status === 409) {
              btn.textContent = '✓ Уже отправлен';
              btn.className = 'signal-btn sent';
            } else {
              btn.disabled = false; btn.textContent = '📡 Отправить сигнал';
            }
          } catch { btn.disabled = false; btn.textContent = '📡 Отправить сигнал'; }
        });
      }

      // Track history
      const history = Array.isArray(profileUser.trackHistory) ? profileUser.trackHistory : [];
      if (history.length) {
        const sec = document.getElementById('historySection');
        const list = document.getElementById('trackList');
        sec.style.display = '';
        list.innerHTML = history.slice(0, 5).map(t => `
          <div class="track-item">
            ${t.image
              ? `<img class="track-cover" src="${t.image}" alt="" />`
              : `<div class="track-cover" style="display:flex;align-items:center;justify-content:center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>`
            }
            <div style="flex:1;min-width:0;">
              <div class="track-name">${t.track}</div>
              <div class="track-artist">${t.artist}</div>
            </div>
            <div class="track-ago">${timeAgo(t.ts)}</div>
          </div>
        `).join('');
      }



      // Если это мой профиль — кнопка редактировать
      if (isMe) {
        const editBtn = document.createElement('a');
        editBtn.href = '/profile';
        editBtn.style.cssText = 'display:block;margin:16px 20px 0;padding:14px;border-radius:14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);text-align:center;font:700 13px/1 Inter,sans-serif;color:rgba(255,255,255,0.6);text-decoration:none;';
        editBtn.textContent = '✏️ Редактировать профиль';
        document.querySelector('.page').appendChild(editBtn);
      }
    }

    init();
  })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
